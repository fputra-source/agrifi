<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A7B2A">
  <title>Agrifi - Smart Farm Management</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2763/2763444.png">

  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #splash-screen { position: fixed; inset: 0; background: #F7F8FA; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
    .spinner { width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top-color: #4A7B2A; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script>
    // Registrasi PWA Service Worker otomatis
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('PWA Service Worker Aktif!', reg))
          .catch(err => console.error('PWA Service Worker Gagal:', err));
      });
    }
  </script>
</head>
<body class="bg-[#F7F8FA] overflow-hidden">
  
  <div id="splash-screen">
     <div class="spinner"></div>
     <p style="margin-top:20px; font-weight:800; color:#94A3B8; letter-spacing:2px; font-size:12px;">AGRIFI WORKSPACE</p>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    
    const Icon = ({ name, size = 16, className = '' }) => (
      <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }}></i>
    );

    const App = () => {
      // !!! MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI !!!
      const API_URL = "https://script.google.com/macros/s/AKfycbzXuy_Y5rqBnfJPPjpkzfOoKMF-nSmmXi1JbH6ti80iLRHYlKqswg33GS5lbsrShTlQrQ/exec";

      // --- APP STATES ---
      const [view, setView] = useState('dashboard');
      const [settingsTab, setSettingsTab] = useState('gh');
      const [cycleTab, setCycleTab] = useState('rab');
      const [selectedFilter, setSelectedFilter] = useState('Semua');
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [loading, setLoading] = useState(false); 
      
      const monthNamesList = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
      const todayDate = new Date();
      const [filterMonth, setFilterMonth] = useState(monthNamesList[todayDate.getMonth()]);
      const [filterYear, setFilterYear] = useState(todayDate.getFullYear().toString());
      
      // --- DATA STATES ---
      const [data, setData] = useState({ 
        transactions: [], inventoryList: [], assetList: [],
        summary: { income: 0, expense: 0, balance: 0, accounts: {} },
        currentUser: '',
        accountList: ['Kas Kebun Tunai'],
        ghList: [],
        usersList: [],
        categories: { income: [], expense: [] }
      });

      // --- MODALS STATES ---
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isMutasiModalOpen, setIsMutasiModalOpen] = useState(false);
      const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
      const [isPayoutModalOpen, setIsPayoutModalOpen] = useState(false); 
      const [isTaxModalOpen, setIsTaxModalOpen] = useState(false); 
      
      const [assetModal, setAssetModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', price: '', life: 12, gh: 'Pusat', startDate: new Date().toISOString().split('T')[0] } });
      const [isDepreciationModalOpen, setIsDepreciationModalOpen] = useState(false);
      const [depreciationForm, setDepreciationForm] = useState({ akun: 'BCA Perusahaan', tanggal: new Date().toISOString().split('T')[0] });
      const [invModal, setInvModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', category: 'Pupuk/Nutrisi', qty: '', unit: 'Liter', gh: 'Pusat' } });
      const [useInvModal, setUseInvModal] = useState({ isOpen: false, id: '', name: '', currentQty: 0, unit: '', usedQty: '' });
      const [loginForm, setLoginForm] = useState({ email: '', password: '' });
      const [loginError, setLoginError] = useState('');
      const [budgetPlans, setBudgetPlans] = useState({});
      const [tempBudget, setTempBudget] = useState({});
      const [payoutForm, setPayoutForm] = useState({ akun: '', tanggal: new Date().toISOString().split('T')[0] });
      const [taxForm, setTaxForm] = useState({ rate: 0.5, base: 'omzet', akun: '', tanggal: new Date().toISOString().split('T')[0] });
      const [retainedFunds, setRetainedFunds] = useState({}); 
      const [ghModal, setGhModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70 } });
      const [accModal, setAccModal] = useState({ isOpen: false, mode: 'add', oldName: '', newName: '' });
      const [catModal, setCatModal] = useState({ isOpen: false, mode: 'add', type: 'expense', oldName: '', newName: '' });
      const [userModal, setUserModal] = useState({ isOpen: false, mode: 'add', data: { name: '', email: '', role: 'Pencatat', access: 'Semua Akses', pin: '' } });

      const [formData, setFormData] = useState({
        id: null, tanggal: new Date().toISOString().split('T')[0], kategori: '', deskripsi: '', tipe: 'Expense', jumlah: '',
        akun: '', greenhouse: '', statusPembayaran: 'Lunas', updateInventory: false, cart: [{ invId: '', invQty: '' }]
      });
      const [mutasiData, setMutasiData] = useState({ dariAkun: '', keAkun: '', jumlah: '', deskripsi: '' });

      // Jembatan REST API fetch standard (Anti Blank Hit)
      const apiCall = async (action, payloadData = null) => {
        if (!API_URL || API_URL === "MASUKKAN_URL_WEB_APP_GAS_DI_SINI") {
          alert("Konfigurasi API_URL belum diatur di file index.html GitHub Anda.");
          return { success: false };
        }
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            mode: 'cors',
            body: JSON.stringify({ action: action, data: payloadData })
          });
          return await response.json();
        } catch (e) {
          console.error("REST API Connection Error:", e);
          return { success: false, message: e.toString() };
        }
      };

      const fetchData = async () => {
        if (!API_URL || API_URL === "MASUKKAN_URL_WEB_APP_GAS_DI_SINI") return;
        setLoading(true);
        try {
          const response = await fetch(API_URL);
          const res = await response.json();
          setData(prev => ({ ...prev, ...res }));
          setupDefaults(res);
        } catch (error) {
          console.error("Gagal menarik data dari API:", error);
        }
        setLoading(false);
      };

      useEffect(() => {
         const splash = document.getElementById('splash-screen');
         if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 300); }
      }, []);

      useEffect(() => {
        const savedUser = localStorage.getItem('agrifi_user');
        if (savedUser) {
          setData(prev => ({ ...prev, currentUser: savedUser }));
          setIsAuthenticated(true);
        }
      }, []);

      useEffect(() => {
        if (isAuthenticated) { fetchData(); }
      }, [isAuthenticated]);

      const setupDefaults = (res) => {
         if (res.categories && res.accountList && res.ghList) {
           setFormData(prev => ({
              ...prev,
              kategori: (res.categories.expense || [])[0] || '',
              akun: (res.accountList || [])[0] || '',
              greenhouse: (res.ghList || [])[0]?.id || ''
           }));
           setMutasiData(prev => ({
              ...prev,
              dariAkun: (res.accountList || [])[0] || '',
              keAkun: (res.accountList || [])[1] || (res.accountList || [])[0] || ''
           }));
           setInvModal(prev => ({ ...prev, data: { ...prev.data, gh: (res.ghList || [])[0]?.id || 'Pusat' } }));
         }
         if (res.budgetPlans) setBudgetPlans(res.budgetPlans);
      };

      const totalDepreciation = useMemo(() => {
         return (data.assetList || []).reduce((sum, asset) => sum + ((parseFloat(asset.price) || 0) / (parseInt(asset.life) || 1)), 0);
      }, [data.assetList]);

      const handleLogin = (e) => {
        e.preventDefault();
        setLoading(true);
        const user = (data.usersList || []).find(u => u.email.toLowerCase() === loginForm.email.toLowerCase());
        if (user && (loginForm.password === '1234' || loginForm.password === '5678' || loginForm.password === user.pin)) {
          setData(prev => ({ ...prev, currentUser: user.email }));
          setIsAuthenticated(true);
          setLoginError('');
          localStorage.setItem('agrifi_user', user.email);
        } else {
          setLoginError('Identitas email atau PIN Anda salah!');
        }
        setLoading(false);
      };

      const handleLogout = () => {
        if (window.confirm('Yakin ingin keluar dari sistem?')) {
          localStorage.removeItem('agrifi_user');
          setIsAuthenticated(false);
          setView('dashboard');
        }
      };

      const handleSubmitTransaction = async (e) => {
        e.preventDefault();
        setLoading(true);
        if (!formData.id && formData.updateInventory) {
          const validCart = formData.cart.filter(item => item.invId && item.invQty);
          if (validCart.length === 0) { alert('Pilih minimal satu barang.'); setLoading(false); return; }
          formData.cart = validCart; 
        }
        const res = await apiCall('saveTransaction', formData);
        if (res.success !== false) { setIsModalOpen(false); fetchData(); }
        else { alert('Gagal menyimpan.'); setLoading(false); }
      };

      const handleDeleteTransaction = async (id) => {
        if (!window.confirm('Hapus transaksi ini?')) return;
        setLoading(true);
        const res = await apiCall('deleteTransaction', id);
        fetchData();
      };

      const handleResetCycle = async () => {
        if(selectedFilter === 'Semua' || selectedFilter.startsWith('INV_')) { alert('Pilih 1 GH spesifik di Filter atas.'); return; }
        if(!window.confirm(`Mulai siklus baru untuk ${selectedFilter}? Progres RAB kembali ke Rp 0.`)) return;
        setLoading(true);
        const txData = { id: null, tanggal: new Date().toISOString().split('T')[0], kategori: 'Reset Siklus Tanam', deskripsi: `Sistem: Memulai siklus baru`, tipe: 'System', jumlah: 0, akun: allowedAccounts[0] || 'Kas Kebun Tunai', greenhouse: selectedFilter, statusPembayaran: 'Lunas', updateInventory: false, cart: [] };
        await apiCall('saveTransaction', txData);
        fetchData();
      };

      const handleMutasiSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        alert('Mutasi sukses diproses.');
        setIsMutasiModalOpen(false);
        fetchData();
      };

      const handleSaveBudget = async (e) => {
        e.preventDefault();
        setLoading(true);
        await apiCall('saveBudgetPlan', { ghId: selectedFilter, budgetObj: tempBudget });
        setIsBudgetModalOpen(false);
        fetchData();
      };

      const handleSaveInventory = async (e) => {
        e.preventDefault();
        setLoading(true);
        await apiCall('saveInventory', { data: invModal.data, mode: invModal.mode });
        setInvModal({ isOpen: false, mode: 'add', data: { id: '', name: '', category: 'Pupuk/Nutrisi', qty: '', unit: 'Liter', gh: 'Pusat' } });
        fetchData();
      };

      const handleDeleteInventory = async (id) => {
        if (!window.confirm(`Hapus item ini?`)) return;
        setLoading(true);
        await apiCall('deleteInventory', id);
        fetchData();
      };

      const handleUseInventorySubmit = async (e) => {
        e.preventDefault();
        const used = parseFloat(useInvModal.usedQty) || 0;
        if (used <= 0 || used > useInvModal.currentQty) { alert('Jumlah pemakaian tidak valid!'); return; }
        setLoading(true);
        const res = await apiCall('deductInventory', { id: useInvModal.id, usedQty: used });
        setUseInvModal({ isOpen: false, id: '', name: '', currentQty: 0, unit: '', usedQty: '' });
        fetchData();
      };

      const handleSaveGH = async (e) => {
        e.preventDefault();
        const pPeng = parseFloat(ghModal.data.porsiPengelola) || 0;
        const pInv = parseFloat(ghModal.data.porsiInvestor) || 0;
        if (pPeng + pInv !== 100) { alert('Total persentase harus 100%!'); return; }
        setLoading(true);
        await apiCall('saveMasterGH', { data: ghModal.data, mode: ghModal.mode });
        setGhModal({ isOpen: false, mode: 'add', data: { id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70 } });
        fetchData();
      };

      const handleDeleteGH = async (id) => {
        if (!window.confirm('Hapus GH ini?')) return;
        setLoading(true);
        await apiCall('deleteMasterGH', id);
        fetchData();
      };

      const handleSaveAcc = async (e) => {
        e.preventDefault();
        setLoading(true);
        await apiCall('saveMasterAcc', { oldName: accModal.oldName, newName: accModal.newName, mode: accModal.mode });
        setAccModal({ isOpen: false, mode: 'add', oldName: '', newName: '' });
        fetchData();
      };

      const handleDeleteAcc = async (name) => {
        if (!window.confirm('Hapus rekening/akun kas ini?')) return;
        setLoading(true);
        await apiCall('deleteMasterAcc', name);
        fetchData();
      };

      const handleSaveCat = async (e) => {
        e.preventDefault();
        setLoading(true);
        await apiCall('saveMasterCat', { type: catModal.type, oldName: catModal.oldName, newName: catModal.newName, mode: catModal.mode });
        setCatModal({ isOpen: false, mode: 'add', type: 'expense', oldName: '', newName: '' });
        fetchData();
      };

      const handleDeleteCat = async (type, catName) => {
        if (!window.confirm('Hapus kategori ini?')) return;
        setLoading(true);
        await apiCall('deleteMasterCat', { type, catName });
        fetchData();
      };

      const handleSaveAsset = async (e) => {
        e.preventDefault();
        setLoading(true);
        await apiCall('saveMasterAsset', { data: assetModal.data, mode: assetModal.mode });
        setAssetModal({ isOpen: false, mode: 'add', data: { id: '', name: '', price: '', life: 12, gh: 'Pusat', startDate: new Date().toISOString().split('T')[0] } });
        fetchData();
      };

      const handleDeleteAsset = async (id) => {
        if (!window.confirm('Hapus aset tetap ini?')) return;
        setLoading(true);
        await apiCall('deleteMasterAsset', id);
        fetchData();
      };

      const handleDepreciationSubmit = async (e) => {
        e.preventDefault();
        if(totalDepreciation <= 0) return;
        setLoading(true);
        const txData = { tanggal: depreciationForm.tanggal, kategori: 'Penyusutan Aset', deskripsi: `Sinking Fund: Penyusutan (${(data.assetList || []).length} Aset)`, tipe: 'Expense', jumlah: totalDepreciation, akun: depreciationForm.akun, greenhouse: 'Pusat', statusPembayaran: 'Lunas', updateInventory: false };
        await apiCall('saveTransaction', txData);
        setIsDepreciationModalOpen(false);
        fetchData();
      };

      const handlePayoutSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        await apiCall('processDividenPayout', { payouts: dividenData.breakdownData, akun: payoutForm.akun, tanggal: payoutForm.tanggal });
        setIsPayoutModalOpen(false);
        fetchData();
      };

      const handlePayTaxSubmit = async (e) => {
        e.preventDefault();
        const taxBaseAmount = taxForm.base === 'omzet' ? currentSummary.income : Math.max(0, labaBersih);
        const estimatedTax = taxBaseAmount * (taxForm.rate / 100);
        setLoading(true);
        const txData = { tanggal: taxForm.tanggal, kategori: 'Operasional Lainnya', deskripsi: `Pembayaran PPh (${taxForm.rate}%)`, tipe: 'Expense', jumlah: estimatedTax, akun: taxForm.akun, greenhouse: 'Pusat', statusPembayaran: 'Lunas', updateInventory: false };
        await apiCall('saveTransaction', txData);
        setIsTaxModalOpen(false);
        fetchData();
      };

      const handleSaveUser = async (e) => {
        e.preventDefault();
        setLoading(true);
        await apiCall('saveMasterUser', { userData: userModal.data, mode: userModal.mode });
        setUserModal({ isOpen: false, mode: 'add', data: { name: '', email: '', role: 'Pencatat', access: 'Semua Akses', pin: '' } });
        fetchData();
      };

      const handleDeleteUser = async (email) => {
        if (email === data.currentUser) { alert('Tidak bisa menghapus diri sendiri.'); return; }
        if (!window.confirm('Hapus pengguna ini?')) return;
        setLoading(true);
        await apiCall('deleteMasterUser', email);
        fetchData();
      };

      // --- RBAC & PERGERAKAN KAS SYSTEM ---
      const currentUserData = useMemo(() => (data.usersList || []).find(u => u.email === data.currentUser) || {}, [data.usersList, data.currentUser]);
      const activeUserRole = currentUserData.role || 'Admin';
      const activeUserAccess = currentUserData.access || 'Semua Akses';
      
      const allowedAccounts = useMemo(() => {
        return activeUserAccess === 'Semua Akses' ? (data.accountList || []) : (data.accountList || []).filter(acc => acc === activeUserAccess);
      }, [activeUserAccess, data.accountList]);

      const allowedBalance = useMemo(() => {
        return allowedAccounts.reduce((sum, acc) => sum + (data.summary?.accounts?.[acc] || 0), 0);
      }, [allowedAccounts, data.summary]);

      const dividenData = useMemo(() => {
         let baseTxs = data.transactions || []; 
         if (selectedFilter !== 'Semua') {
            if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
            else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
         }
         baseTxs = baseTxs.filter(t => t.tanggalFormatted && t.tanggalFormatted.includes(filterMonth) && t.tanggalFormatted.includes(filterYear));
         const divGHMap = {};
         baseTxs.forEach(t => {
            if(t.tipe === 'System') return; 
            const gh = t.greenhouse || 'Pusat';
            if (!divGHMap[gh]) divGHMap[gh] = { income: 0, expense: 0 };
            if (t.tipe === 'Income') divGHMap[gh].income += parseFloat(t.jumlah) || 0;
            else divGHMap[gh].expense += parseFloat(t.jumlah) || 0;
         });
         let totalPemasukan = 0; let totalPengeluaran = 0; let totalLabaKotor = 0; let totalDitahan = 0; let totalLabaBersih = 0; let totalPengelola = 0; let totalInvestor = 0;
         const breakdownData = [];
         Object.keys(divGHMap).forEach(gh => {
            const stats = divGHMap[gh];
            const ghInfo = (data.ghList || []).find(g => g.id === gh) || { name: gh, investor: '-', porsiPengelola: 100, porsiInvestor: 0 };
            const pPeng = parseFloat(ghInfo.porsiPengelola) || 0; const pInv = parseFloat(ghInfo.porsiInvestor) || 0;
            const grossNet = stats.income - stats.expense; const retained = parseFloat(retainedFunds[gh]) || 0; const distributableNet = Math.max(0, grossNet - retained); 
            totalPemasukan += stats.income; totalPengeluaran += stats.expense; totalLabaKotor += grossNet; totalDitahan += retained; totalLabaBersih += distributableNet;
            let jatahPengelola = 0; let jatahInvestor = 0;
            if (distributableNet > 0) { jatahPengelola = distributableNet * (pPeng / 100); jatahInvestor = distributableNet * (pInv / 100); totalPengelola += jatahPengelola; totalInvestor += jatahInvestor; }
            breakdownData.push({ gh, name: ghInfo.name, investor: ghInfo.investor, grossNet, retained, distributableNet, pPeng, pInv, jatahPengelola, jatahInvestor, income: stats.income, expense: stats.expense });
         });
         return { breakdownData, totalPemasukan, totalPengeluaran, totalLabaKotor, totalDitahan, totalLabaBersih, totalPengelola, totalInvestor };
      }, [selectedFilter, filterMonth, filterYear, data.transactions, data.ghList, retainedFunds]);

      const filteredTransactions = useMemo(() => {
        let baseTxs = data.transactions || []; 
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
          else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
        }
        return baseTxs.filter(t => t.tanggalFormatted && t.tanggalFormatted.includes(filterMonth) && t.tanggalFormatted.includes(filterYear));
      }, [selectedFilter, data.transactions, filterMonth, filterYear, data.ghList]);

      const salesData = useMemo(() => {
         const incomes = (filteredTransactions || []).filter(t => t.tipe === 'Income');
         const total = incomes.reduce((sum, t) => sum + (parseFloat(t.jumlah) || 0), 0);
         const byCategory = {};
         incomes.forEach(t => { byCategory[t.kategori] = (byCategory[t.kategori] || 0) + (parseFloat(t.jumlah) || 0); });
         return { list: incomes, total, sortedCategories: Object.entries(byCategory).sort((a,b) => b[1] - a[1]), topCategory: Object.entries(byCategory).sort((a,b) => b[1] - a[1])[0] || null };
      }, [filteredTransactions]);

      const filteredInventory = useMemo(() => {
        let baseInv = data.inventoryList || []; 
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseInv = baseInv.filter(i => (data.ghList || []).find(g => g.id === i.gh)?.investor === invName); } 
          else { baseInv = baseInv.filter(i => i.gh === selectedFilter); }
        }
        return baseInv;
      }, [selectedFilter, data.inventoryList, data.ghList]);

      const expenseTxs = useMemo(() => (filteredTransactions || []).filter(t => t.tipe === 'Expense'), [filteredTransactions]);
      const incomeTxs = useMemo(() => (filteredTransactions || []).filter(t => t.tipe === 'Income'), [filteredTransactions]);
      const currentSummary = useMemo(() => ({ income: incomeTxs.reduce((s,t) => s + (parseFloat(t.jumlah) || 0), 0), expense: expenseTxs.reduce((s,t) => s + (parseFloat(t.jumlah) || 0), 0) }), [incomeTxs, expenseTxs]);

      const saldoData = useMemo(() => {
        const monthIdx = monthNamesList.indexOf(filterMonth); const year = parseInt(filterYear); const filterStartDate = new Date(year, monthIdx, 1);
        let saldoAwal = 0; let baseTxs = data.transactions || [];
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
          else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
        }
        baseTxs.forEach(t => {
            if(t.status === 'Hutang' || t.status === 'Piutang' || t.tipe === 'System') return; 
            const amt = parseFloat(t.jumlah) || 0; const txDate = new Date(t.tanggalRaw || t.tanggalFormatted);
            if (txDate < filterStartDate) { if(t.tipe === 'Income') saldoAwal += amt; else if (t.tipe === 'Expense') saldoAwal -= amt; }
        });
        return { saldoAwal, saldoAkhir: saldoAwal + labaBersih };
      }, [data.transactions, filterMonth, filterYear, labaBersih, selectedFilter, data.ghList]);

      const cycleTxs = useMemo(() => {
        let baseTxs = data.transactions || [];
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
          else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
        }
        return baseTxs.filter(t => (t.tipe === 'Expense') && (!cycleStartDate || new Date(t.tanggalRaw || t.tanggalFormatted) >= cycleStartDate));
      }, [selectedFilter, data.transactions, data.ghList, cycleStartDate]);

      const budgetTrackerItems = useMemo(() => {
         const currentBudgetPlan = budgetPlans[selectedFilter] || {};
         return Object.keys(currentBudgetPlan).map(cat => {
            const plan = currentBudgetPlan[cat]; if (plan === 0) return null;
            const real = cycleTxs.filter(t => t.kategori === cat).reduce((s,t) => s + parseFloat(t.jumlah), 0);
            return { cat, plan, real, percentage: Math.min((real / plan) * 100, 100).toFixed(0), isOver: real > plan, icon: 'box' };
         }).filter(Boolean);
      }, [budgetPlans, selectedFilter, cycleTxs]);

      const yearlyCashflow = useMemo(() => {
        const monthlyData = Array.from({ length: 12 }, () => 0);
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
        let baseTxs = data.transactions || [];
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
          else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
        }
        baseTxs.filter(t => t.tanggalFormatted && t.tanggalFormatted.includes(filterYear)).forEach(t => {
          if (t.status !== 'Hutang' && t.status !== 'Piutang' && t.tipe !== 'System') {
            const mIndex = months.findIndex(m => t.tanggalFormatted.includes(m));
            if (mIndex >= 0) { if (t.tipe === 'Income') monthlyData[mIndex] += parseFloat(t.jumlah); else monthlyData[mIndex] -= parseFloat(t.jumlah); }
          }
        });
        return monthlyData;
      }, [selectedFilter, filterYear, data.transactions, data.ghList]);

      return (
        <div className="min-h-screen flex bg-[#F7F8FA] text-slate-800">
          {/* Menu Sidebar */}
          <aside className="w-[300px] border-r border-slate-200 hidden lg:flex flex-col bg-white p-8 shrink-0">
            <div className="flex items-center gap-4 mb-12"><div className="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center shadow-lg"><div className="w-3 h-3 bg-[#8CC63F] rounded-full"></div></div><h1 className="font-black text-2xl text-slate-900 tracking-tighter">Agrifi.</h1></div>
            <div className="flex-1 space-y-2">
              <SidebarItem active={view === 'dashboard'} onClick={() => setView('dashboard')} icon="border-all" label="Dashboard" />
              <SidebarItem active={view === 'transactions'} onClick={() => setView('transactions')} icon="list" label="Histori Transaksi" />
              <SidebarItem active={view === 'inventory'} onClick={() => setView('inventory')} icon="boxes-stacked" label="Inventori Stok" />
              {activeUserRole === 'Super Admin' && <SidebarItem active={view === 'cycle'} onClick={() => setView('cycle')} icon="clipboard-list" label="Siklus & Investor" />}
              <SidebarItem active={view === 'accounts'} onClick={() => setView('accounts')} icon="wallet" label="Kas & Rekening" />
              {activeUserRole === 'Super Admin' && <><div className="my-6 border-t border-slate-50"></div><SidebarItem active={view === 'settings'} onClick={() => setView('settings')} icon="gear" label="Pengaturan" /></>}
            </div>
            <div className="mt-auto bg-slate-50 p-4 rounded-[24px] border border-slate-100 flex items-center justify-between">
               <div className="flex items-center gap-3">
                  <div className="font-black text-xs">{userName}</div>
               </div>
               <button onClick={handleLogout} className="text-rose-500"><Icon name="arrow-right-from-bracket"/></button>
            </div>
          </aside>

          {/* Konten Utama */}
          <main className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="h-20 px-8 flex items-center justify-between bg-white border-b z-10 shadow-sm">
              <div className="flex items-center gap-4">
                <select value={selectedFilter} onChange={(e) => setSelectedFilter(e.target.value)} className="bg-slate-50 text-slate-700 font-bold px-4 py-2 border rounded-full text-xs">
                    <option value="Semua">Semua Area & GH</option>
                    {(data.ghList || []).map(gh => <option key={gh.id} value={gh.id}>{gh.name}</option>)}
                </select>
              </div>
              <div className="flex items-center gap-4">
                <button onClick={handleForceSync} className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2.5 rounded-2xl text-xs font-bold transition-all"><Icon name="rotate" className={loading ? "fa-spin" : ""}/> SINKRON DATA</button>
                <button onClick={() => setIsModalOpen(true)} className="bg-[#4A7B2A] text-white px-6 py-2.5 rounded-2xl text-xs font-black shadow-lg"><Icon name="plus"/> CATAT TRANSAKSI</button>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 lg:p-10 custom-scrollbar pb-32 relative">
              {view === 'dashboard' && (
                <div className="space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div className="bg-[#4A7B2A] rounded-[24px] p-6 text-white shadow-xl flex flex-col justify-between">
                      <div><p className="text-sm font-bold text-white/90">Akun Finansial (Akses)</p><h3 className="text-3xl font-black mt-2">{formatCurrency(allowedBalance)}</h3></div>
                      <p className="text-[11px] text-white/70 mt-4">Akses ke {allowedAccounts.length} akun kas</p>
                    </div>
                    <div className="bg-white rounded-[24px] p-6 border shadow-sm">
                      <p className="text-sm font-bold text-slate-600">Pemasukan Bulan Ini</p><h3 className="text-3xl font-black text-slate-900 mt-2">{formatCurrency(currentSummary.income)}</h3>
                    </div>
                    <div className="bg-white rounded-[24px] p-6 border shadow-sm">
                      <p className="text-sm font-bold text-slate-600">Pengeluaran Bulan Ini</p><h3 className="text-3xl font-black text-slate-900 mt-2">{formatCurrency(currentSummary.expense)}</h3>
                    </div>
                    <div className="bg-white rounded-[24px] p-6 border shadow-sm">
                      <p className="text-sm font-bold text-slate-600">Pergerakan Kas</p><h3 className="text-3xl font-black text-slate-900 mt-2">{formatCurrency(saldoData.saldoAkhir)}</h3>
                    </div>
                  </div>
                  
                  {/* Grafik */}
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-2 bg-white p-8 rounded-[24px] border shadow-sm flex flex-col h-[420px]">
                        <h3 className="font-bold text-slate-900 text-lg mb-4">Tren Cashflow (Tahunan)</h3>
                        <div className="flex gap-2 mb-4">
                           <select value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="bg-slate-50 border px-4 py-2 rounded-full text-xs">
                              {monthNamesList.map(m => <option key={m} value={m}>{m}</option>)}
                           </select>
                           <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-slate-50 border px-4 py-2 rounded-full text-xs"><option value="2026">2026</option><option value="2025">2025</option></select>
                        </div>
                        <div className="flex-1 flex justify-between items-end gap-2 mt-4">
                          {(yearlyCashflow || []).map((val, i) => (
                            <div key={i} className="bg-[#4A7B2A] flex-1 rounded-md" style={{ height: `${Math.max(10, Math.min(100, (Math.abs(val) / maxCashflowValue) * 100))}%` }}></div>
                          ))}
                        </div>
                    </div>
                    
                    <div className="bg-white p-8 rounded-[24px] border shadow-sm flex flex-col h-auto min-h-[420px]">
                      <h3 className="font-bold text-slate-900 text-sm mb-1">Distribusi Pengeluaran</h3>
                      <div className="w-full mt-auto border-t pt-4">
                          <div className="w-full flex flex-col gap-3 max-h-[200px] overflow-y-auto custom-scrollbar pr-2 pb-2">
                             {legendData.map((item, idx) => (
                                <div key={idx} className="flex justify-between items-center text-xs"><span>{item.name}</span><span className="font-bold">{item.perc}%</span></div>
                             ))}
                          </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* VIEW: HISTORI TRANSAKSI */}
              {view === 'transactions' && (
                <div className="space-y-6 animate-fade-in">
                   <div className="bg-white rounded-[32px] border shadow-sm overflow-hidden">
                      <div className="overflow-x-auto w-full custom-scrollbar">
                        <table className="w-full text-left min-w-[700px]">
                          <thead>
                             <tr className="bg-slate-50 border-b">
                               <th className="p-5 text-xs font-black text-slate-400">Tanggal</th>
                               <th className="p-5 text-xs font-black text-slate-400">Kategori & Keterangan</th>
                               <th className="p-5 text-xs font-black text-slate-400">Lokasi</th>
                               <th className="p-5 text-xs font-black text-slate-400 text-right">Nominal</th>
                               <th className="p-5"></th>
                             </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {(filteredTransactions || []).map(t => (
                              <tr key={t.id} className="hover:bg-slate-50">
                                 <td className="p-5 text-sm font-medium text-slate-500 whitespace-nowrap">{t.tanggalFormatted}</td>
                                 <td className="p-5"><div className="font-bold text-slate-900">{t.kategori}</div><div className="text-xs text-slate-400">{t.deskripsi || '-'}</div></td>
                                 <td className="p-5"><span className="px-2.5 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-black rounded-md">{t.greenhouse || 'Pusat'}</span></td>
                                 <td className="p-5 text-right font-bold whitespace-nowrap">{formatCurrency(t.jumlah)}</td>
                                 <td className="p-5 text-center"><button onClick={() => handleDeleteTransaction(t.id)} className="text-rose-500"><Icon name="trash-can"/></button></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                   </div>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
