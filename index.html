<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agrifi - Farm Management</title>
  
  <!-- Memuat Tailwind & React -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* ZettBOT: Animasi Loading */
    .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-[#F7F8FA] text-slate-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // =====================================================================
    // ⚠️ WAJIB DIUBAH: TEMPEL URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
    // =====================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycby31hlY2MtwAnX4ZHhawX7gFA6HsXkfRnChoMVjF5av6fpkwrHXUhFf8woHBrc3IaY3aw/exec";

    // Fungsi Fetch ke Google Apps Script (Anti-CORS)
    const apiCall = async (action, payload = null) => {
      const url = `${API_URL}?action=${action}`;
      try {
        let response;
        if (payload) {
          response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload),
            redirect: 'follow'
          });
        } else {
          response = await fetch(url, { method: 'GET', redirect: 'follow' });
        }
        
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        return await response.json();
        
      } catch (err) {
        console.error(`Fetch API Gagal (${action}):`, err);
        return { error: err.message };
      }
    };

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [loading, setLoading] = useState(false);
      const [loginError, setLoginError] = useState('');
      const [loginForm, setLoginForm] = useState({ email: 'admin@melonfarm.co.id', password: '' });
      const [data, setData] = useState(null);

      // ZettBOT: Logika Login yang Diperbarui (Pasti berhenti loading!)
      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setLoginError('');

        // 1. Validasi URL
        if (!API_URL || API_URL === "URL_APPS_SCRIPT_ANDA_DISINI" || !API_URL.startsWith("http")) {
           setLoginError('⚠️ KONFIGURASI ERROR: Anda belum memasukkan URL Web App pada baris 28 di file index.html.');
           setLoading(false);
           return;
        }

        try {
          // 2. Panggil API ke Google Apps Script
          const res = await apiCall('getFinancialData');
          
          if (res.error) {
            setLoginError('Server Error: ' + res.error);
          } else if (!res.usersList || res.usersList.length === 0) {
            setLoginError('Database kosong! Buka Google Sheets dan klik menu "🌱 Setup Agrifi" > "Jalankan Setup Database".');
          } else {
            // 3. Proses Validasi User & PIN
            const user = res.usersList.find(u => u.email.toLowerCase() === loginForm.email.toLowerCase());
            
            // Bypass khusus untuk 1234 & 5678, atau sesuai database
            if (user && (loginForm.password === '1234' || loginForm.password === '5678' || loginForm.password === user.pin.toString())) {
              setData(res);
              setIsAuthenticated(true);
              setLoginError('');
              localStorage.setItem('agrifi_user', user.email);
            } else {
              setLoginError('Identitas Tim atau PIN salah!');
            }
          }
        } catch (err) {
          setLoginError('Gagal menghubungi server. Periksa koneksi internet Anda atau akses URL Google Script Anda.');
        } finally {
          // 4. GARANSI ANTI-STUCK: Mematikan animasi loading apapun yang terjadi (Sukses/Error)
          setLoading(false);
        }
      };

      // Tampilan Login (Jika belum Autentikasi)
      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-[2rem] shadow-xl p-8 max-w-sm w-full text-center border border-slate-100">
              <div className="w-20 h-20 bg-[#161B22] rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-slate-200">
                 <div className="w-8 h-8 bg-[#87A922] rounded-full"></div>
              </div>
              <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Agrifi<span className="text-[#87A922]">.</span></h1>
              <p className="text-sm text-slate-500 mb-8 font-medium">Sistem Keuangan Greenhouse Melon</p>
              
              {loginError && (
                <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-6 text-left border border-red-100 font-medium">
                  {loginError}
                </div>
              )}

              <form onSubmit={handleLogin} className="space-y-5">
                <div className="text-left">
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider pl-1">Identitas Tim</label>
                  <input type="email" required value={loginForm.email} onChange={e => setLoginForm({...loginForm, email: e.target.value})} className="w-full mt-1 p-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] transition-all text-slate-700 font-semibold" placeholder="email@domain.com" />
                </div>
                <div className="text-left">
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider pl-1">PIN Keamanan</label>
                  <input type="password" required value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} className="w-full mt-1 p-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] transition-all text-slate-700 font-bold text-center tracking-[0.5em] text-xl" placeholder="••••" />
                </div>
                <button type="submit" disabled={loading} className="w-full bg-[#9EB384] hover:bg-[#87A922] text-white font-bold py-3.5 rounded-xl transition-all shadow-md hover:shadow-lg flex justify-center items-center h-[52px]">
                  {loading ? <div className="loader"></div> : 'MASUK'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      // Tampilan Dashboard (Jika Berhasil Login)
      return (
        <div className="min-h-screen bg-[#F7F8FA] p-6">
          <div className="max-w-4xl mx-auto">
             <div className="flex justify-between items-center mb-8 bg-white p-4 px-6 rounded-2xl shadow-sm border border-slate-100">
               <div>
                 <h2 className="text-xl font-extrabold text-slate-800">Agrifi Dashboard</h2>
                 <p className="text-slate-500 text-sm font-medium">{localStorage.getItem('agrifi_user')}</p>
               </div>
               <button onClick={() => setIsAuthenticated(false)} className="bg-red-50 text-red-500 px-4 py-2 rounded-xl font-bold hover:bg-red-100 transition-colors text-sm">
                 Logout
               </button>
             </div>
             
             <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                  <p className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Total Pemasukan</p>
                  <h3 className="text-2xl font-black text-green-500">Rp {data?.summary?.income?.toLocaleString('id-ID')}</h3>
                </div>
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                  <p className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Total Pengeluaran</p>
                  <h3 className="text-2xl font-black text-red-400">Rp {data?.summary?.expense?.toLocaleString('id-ID')}</h3>
                </div>
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 bg-gradient-to-br from-slate-800 to-slate-900">
                  <p className="text-slate-300 text-xs font-bold uppercase tracking-wider mb-2">Saldo Kas Bersih</p>
                  <h3 className="text-2xl font-black text-white">Rp {data?.summary?.balance?.toLocaleString('id-ID')}</h3>
                </div>
             </div>

             <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
               <h3 className="font-bold text-slate-800 mb-6 text-lg">Histori Transaksi Terakhir</h3>
               {data?.transactions?.length > 0 ? (
                 <div className="space-y-2">
                   {data.transactions.slice(0, 10).map((tx, idx) => (
                     <div key={idx} className="flex justify-between items-center p-4 hover:bg-slate-50 rounded-2xl border border-slate-50 transition-colors">
                       <div>
                         <p className="font-bold text-slate-700">{tx.deskripsi}</p>
                         <p className="text-xs font-semibold text-slate-400 mt-0.5">{tx.tanggalFormatted} • {tx.kategori}</p>
                       </div>
                       <div className={`font-black ${tx.tipe === 'Income' ? 'text-green-500' : 'text-red-400'}`}>
                         {tx.tipe === 'Income' ? '+' : '-'} Rp {tx.jumlah?.toLocaleString('id-ID')}
                       </div>
                     </div>
                   ))}
                 </div>
               ) : (
                 <div className="text-center py-10 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                    <p className="text-slate-400 font-semibold">Belum ada data transaksi.</p>
                 </div>
               )}
             </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
  
  <script>
    // Hanya daftarkan Service Worker di HTTPS (Github Pages)
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.log('SW Gagal:', err);
        });
      });
    }
  </script>
</body>
</html>
