<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Agrifi - Smart Farm Management</title>
  
  <!-- PWA Manifest & Theme -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4A7B2A">
  <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=Agrifi&background=4A7B2A&color=fff&size=192">
  
  <!-- Tailwind, React, Babel, Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ZettBOT: Custom Styles & Animations */
    body { -webkit-tap-highlight-color: transparent; }
    .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    .loader-dark { border: 3px solid rgba(135,169,34,0.3); border-top: 3px solid #87A922; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Hide scrollbar for clean UI */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-[#F4F7F6] text-slate-800 font-sans antialiased selection:bg-[#87A922] selection:text-white">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // =====================================================================
    // ⚠️ WAJIB DIUBAH: TEMPEL URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
    // =====================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycby31hlY2MtwAnX4ZHhawX7gFA6HsXkfRnChoMVjF5av6fpkwrHXUhFf8woHBrc3IaY3aw/exec";

    // --- FUNGSI FETCH UTAMA (ANTI CORS & ANTI STUCK) ---
    const apiCall = async (action, payload = null) => {
      const url = `${API_URL}?action=${action}`;
      try {
        let response;
        if (payload) {
          response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload),
            redirect: 'follow'
          });
        } else {
          response = await fetch(url, { method: 'GET', redirect: 'follow' });
        }
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        return await response.json();
      } catch (err) {
        console.error(`Fetch API Gagal (${action}):`, err);
        return { error: err.message };
      }
    };

    function App() {
      // --- STATE MANAGEMENT ---
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [loading, setLoading] = useState(false);
      const [loginError, setLoginError] = useState('');
      const [loginForm, setLoginForm] = useState({ email: 'admin@melonfarm.co.id', password: '' });
      
      const [data, setData] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      
      // Modal States
      const [showTxModal, setShowTxModal] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      // --- EFEK & LOAD DATA AWAL ---
      useEffect(() => {
        // Cek LocalStorage untuk Auto-Login jika pernah login (Opsional)
        const savedUser = localStorage.getItem('agrifi_user');
        // Jika ingin auto-login, kita bisa panggil API di sini. Tapi untuk keamanan, biarkan user login ulang.
      }, []);

      const showNotification = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      const refreshData = async () => {
        setLoading(true);
        const res = await apiCall('getFinancialData');
        if (!res.error) setData(res);
        setLoading(false);
      };

      // --- LOGIKA LOGIN (ROBUST) ---
      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setLoginError('');

        if (!API_URL || API_URL === "URL_APPS_SCRIPT_ANDA_DISINI" || !API_URL.startsWith("http")) {
           setLoginError('⚠️ KONFIGURASI ERROR: Masukkan URL Web App di baris 37 index.html.');
           setLoading(false);
           return;
        }

        try {
          const res = await apiCall('getFinancialData');
          if (res.error) {
            setLoginError('Server Error: ' + res.error);
          } else if (!res.usersList || res.usersList.length === 0) {
            setLoginError('Database kosong! Jalankan Setup Database di Google Sheets.');
          } else {
            const user = res.usersList.find(u => u.email.toLowerCase() === loginForm.email.toLowerCase());
            if (user && (loginForm.password === '1234' || loginForm.password === '5678' || loginForm.password === user.pin.toString())) {
              setData(res);
              setIsAuthenticated(true);
              setLoginError('');
              localStorage.setItem('agrifi_user', user.email);
              localStorage.setItem('agrifi_role', user.role);
            } else {
              setLoginError('Identitas Tim atau PIN salah!');
            }
          }
        } catch (err) {
          setLoginError('Gagal menghubungi server. Periksa koneksi internet Anda.');
        } finally {
          setLoading(false);
        }
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setData(null);
        setLoginForm({...loginForm, password: ''});
        // Tidak menghapus email agar gampang login lagi
      };

      // --- LOGIKA TRANSAKSI ---
      const handleSaveTransaction = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        const fd = new FormData(e.target);
        const payload = {
          tanggal: fd.get('tanggal'),
          kategori: fd.get('kategori'),
          deskripsi: fd.get('deskripsi'),
          tipe: fd.get('tipe'),
          jumlah: parseFloat(fd.get('jumlah').replace(/\./g, '')),
          akun: fd.get('akun'),
          greenhouse: fd.get('greenhouse'),
          statusPembayaran: fd.get('statusPembayaran')
        };

        const res = await apiCall('saveTransaction', payload);
        if (res.success) {
          showNotification('Transaksi berhasil disimpan!');
          setShowTxModal(false);
          refreshData(); // Reload data
        } else {
          showNotification(res.message || 'Gagal menyimpan data', 'error');
        }
        setIsSubmitting(false);
      };

      // =========================================================================
      // UI COMPONENTS
      // =========================================================================

      // 1. TAMPILAN LOGIN
      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-gradient-to-br from-[#F4F7F6] to-[#E2E8F0]">
            {/* Dekorasi Background */}
            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-[#87A922] opacity-10 rounded-full blur-3xl"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-500 opacity-10 rounded-full blur-3xl"></div>
            
            <div className="bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-2xl p-8 max-w-sm w-full text-center border border-white relative z-10 fade-in">
              <div className="w-20 h-20 bg-[#161B22] rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-lg shadow-slate-200/50 relative overflow-hidden">
                 <div className="absolute inset-0 bg-gradient-to-tr from-[#87A922]/20 to-transparent"></div>
                 <div className="w-8 h-8 bg-[#87A922] rounded-full shadow-inner relative z-10"></div>
              </div>
              <h1 className="text-3xl font-black text-slate-900 tracking-tight mb-1">Agrifi<span className="text-[#87A922]">.</span></h1>
              <p className="text-xs text-slate-500 mb-8 font-semibold tracking-wide uppercase">Farm Management System</p>
              
              {loginError && (
                <div className="bg-red-50 text-red-600 p-3.5 rounded-xl text-sm mb-6 text-left border border-red-100 font-medium flex items-start gap-2">
                  <i className="fa-solid fa-triangle-exclamation mt-0.5"></i>
                  <span>{loginError}</span>
                </div>
              )}

              <form onSubmit={handleLogin} className="space-y-5">
                <div className="text-left">
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Identitas Tim</label>
                  <div className="relative mt-1">
                    <i className="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="email" required value={loginForm.email} onChange={e => setLoginForm({...loginForm, email: e.target.value})} className="w-full pl-11 p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] focus:border-transparent transition-all text-slate-700 font-semibold text-sm" placeholder="email@domain.com" />
                  </div>
                </div>
                <div className="text-left">
                  <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">PIN Keamanan</label>
                  <div className="relative mt-1">
                    <i className="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" required value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} className="w-full pl-11 p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] focus:border-transparent transition-all text-slate-700 font-bold tracking-[0.3em] text-lg" placeholder="••••" />
                  </div>
                </div>
                <button type="submit" disabled={loading} className="w-full bg-gradient-to-r from-[#9EB384] to-[#87A922] hover:from-[#87A922] hover:to-[#6b8719] text-white font-bold py-3.5 rounded-xl transition-all shadow-lg hover:shadow-xl flex justify-center items-center h-[52px] transform active:scale-[0.98]">
                  {loading ? <div className="loader"></div> : 'MASUK KE SISTEM'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      // --- HELPERS UNTUK DASHBOARD ---
      const totalIncome = data?.summary?.income || 0;
      const totalExpense = data?.summary?.expense || 0;
      const balance = data?.summary?.balance || 0;

      // 2. TAMPILAN UTAMA (DASHBOARD)
      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-[#F4F7F6]">
          
          {/* TOAST NOTIFICATION */}
          {toast.show && (
            <div className={`fixed top-4 right-4 z-50 p-4 rounded-xl shadow-xl font-bold flex items-center gap-3 fade-in ${toast.type === 'error' ? 'bg-red-500 text-white' : 'bg-[#161B22] text-white'}`}>
              <i className={`fa-solid ${toast.type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check'} text-xl ${toast.type === 'error' ? 'text-white' : 'text-[#87A922]'}`}></i>
              {toast.message}
            </div>
          )}

          {/* SIDEBAR (Desktop) / BOTTOM NAV (Mobile) */}
          <nav className="fixed md:sticky bottom-0 md:top-0 left-0 w-full md:w-64 bg-white md:min-h-screen border-t md:border-t-0 md:border-r border-slate-200 z-40 flex md:flex-col justify-around md:justify-start px-2 py-3 md:p-6 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)] md:shadow-none">
            <div className="hidden md:flex items-center gap-3 mb-10 pl-2">
              <div className="w-8 h-8 bg-[#161B22] rounded-lg flex items-center justify-center">
                 <div className="w-3 h-3 bg-[#87A922] rounded-full"></div>
              </div>
              <h1 className="text-xl font-black text-slate-800 tracking-tight">Agrifi<span className="text-[#87A922]">.</span></h1>
            </div>

            {/* Menu Items */}
            {[
              { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
              { id: 'transactions', icon: 'fa-wallet', label: 'Transaksi' },
              { id: 'inventory', icon: 'fa-box-open', label: 'Inventori' },
              { id: 'settings', icon: 'fa-gear', label: 'Pengaturan' }
            ].map(menu => (
              <button key={menu.id} onClick={() => setActiveTab(menu.id)} 
                className={`flex flex-col md:flex-row items-center gap-1 md:gap-4 p-2 md:p-3.5 rounded-xl transition-all font-semibold md:w-full md:justify-start ${activeTab === menu.id ? 'text-[#87A922] md:bg-[#EFFFF0]' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}`}>
                <i className={`fa-solid ${menu.icon} text-lg md:text-xl md:w-6 text-center`}></i>
                <span className="text-[10px] md:text-sm">{menu.label}</span>
              </button>
            ))}

            {/* User Profile & Logout (Desktop) */}
            <div className="hidden md:block mt-auto pt-6 border-t border-slate-100">
              <div className="flex items-center gap-3 mb-4 px-2">
                <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold">
                  <i className="fa-solid fa-user"></i>
                </div>
                <div className="overflow-hidden">
                  <p className="text-xs font-bold text-slate-700 truncate">{localStorage.getItem('agrifi_user')}</p>
                  <p className="text-[10px] text-slate-400">{localStorage.getItem('agrifi_role') || 'User'}</p>
                </div>
              </div>
              <button onClick={handleLogout} className="w-full py-2.5 text-sm font-bold text-red-500 bg-red-50 hover:bg-red-100 rounded-xl transition-colors flex items-center justify-center gap-2">
                <i className="fa-solid fa-right-from-bracket"></i> Keluar
              </button>
            </div>
          </nav>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 w-full max-w-6xl mx-auto p-4 md:p-8 pb-24 md:pb-8 fade-in">
            
            {/* HEADER MOBILE (Logout Button) */}
            <div className="md:hidden flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-4 border border-slate-100">
               <div className="flex items-center gap-2">
                  <div className="w-6 h-6 bg-[#161B22] rounded-md flex items-center justify-center">
                    <div className="w-2 h-2 bg-[#87A922] rounded-full"></div>
                  </div>
                  <h1 className="text-lg font-black text-slate-800 tracking-tight">Agrifi</h1>
               </div>
               <button onClick={handleLogout} className="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg">Keluar</button>
            </div>

            {loading && activeTab !== 'dashboard' && (
              <div className="flex justify-center p-8"><div className="loader loader-dark"></div></div>
            )}

            {/* TAB: DASHBOARD */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                <div className="flex justify-between items-end">
                  <div>
                    <h2 className="text-2xl font-black text-slate-800">Ringkasan Finansial</h2>
                    <p className="text-slate-500 text-sm font-medium">Data real-time dari seluruh Greenhouse</p>
                  </div>
                  <button onClick={refreshData} disabled={loading} className="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:text-[#87A922] shadow-sm transition-colors">
                    <i className={`fa-solid fa-rotate-right ${loading ? 'animate-spin' : ''}`}></i>
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {/* Saldo Utama */}
                  <div className="bg-[#161B22] p-6 rounded-3xl shadow-lg relative overflow-hidden group">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-5 rounded-full -mr-10 -mt-10 transform group-hover:scale-110 transition-transform"></div>
                    <p className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Saldo Kas Bersih</p>
                    <h3 className="text-3xl font-black text-white mb-4">Rp {balance.toLocaleString('id-ID')}</h3>
                    
                    <div className="border-t border-slate-700/50 pt-4 mt-2">
                      <p className="text-[10px] text-slate-400 font-medium mb-2 uppercase tracking-wide">Distribusi Kas</p>
                      <div className="space-y-1.5">
                        {data?.accountList?.map(acc => (
                          <div key={acc} className="flex justify-between text-xs text-slate-300">
                            <span>{acc}</span>
                            <span className="font-semibold">Rp {(data?.summary?.accounts[acc] || 0).toLocaleString('id-ID')}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Income/Expense */}
                  <div className="space-y-4">
                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4">
                      <div className="w-12 h-12 rounded-2xl bg-green-50 text-green-500 flex items-center justify-center text-xl">
                        <i className="fa-solid fa-arrow-trend-up"></i>
                      </div>
                      <div>
                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-wider mb-0.5">Total Pemasukan</p>
                        <h3 className="text-xl font-black text-slate-800">Rp {totalIncome.toLocaleString('id-ID')}</h3>
                      </div>
                    </div>
                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4">
                      <div className="w-12 h-12 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center text-xl">
                        <i className="fa-solid fa-arrow-trend-down"></i>
                      </div>
                      <div>
                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-wider mb-0.5">Total Pengeluaran</p>
                        <h3 className="text-xl font-black text-slate-800">Rp {totalExpense.toLocaleString('id-ID')}</h3>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Transaksi Terakhir */}
                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                  <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                    <h3 className="font-bold text-slate-800 text-lg">Aktivitas Terakhir</h3>
                    <button onClick={() => setActiveTab('transactions')} className="text-xs font-bold text-[#87A922] hover:underline">Lihat Semua</button>
                  </div>
                  <div className="p-2">
                    {data?.transactions?.slice(0, 5).map((tx, idx) => (
                      <div key={idx} className="flex justify-between items-center p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                        <div className="flex items-center gap-4">
                          <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-sm ${tx.tipe === 'Income' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-500'}`}>
                            <i className={`fa-solid ${tx.tipe === 'Income' ? 'fa-plus' : 'fa-minus'}`}></i>
                          </div>
                          <div>
                            <p className="font-bold text-slate-700 text-sm">{tx.deskripsi}</p>
                            <p className="text-xs font-semibold text-slate-400 mt-0.5">{tx.tanggalFormatted} • {tx.greenhouse}</p>
                          </div>
                        </div>
                        <div className="text-right">
                           <div className={`font-black text-sm md:text-base ${tx.tipe === 'Income' ? 'text-green-600' : 'text-slate-800'}`}>
                             {tx.tipe === 'Income' ? '+' : '-'} Rp {tx.jumlah?.toLocaleString('id-ID')}
                           </div>
                           <p className="text-[10px] font-bold text-slate-400">{tx.akun}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* TAB: TRANSAKSI */}
            {activeTab === 'transactions' && (
              <div className="space-y-6">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                  <div>
                    <h2 className="text-2xl font-black text-slate-800">Buku Transaksi</h2>
                    <p className="text-slate-500 text-sm font-medium">Catatan pemasukan & pengeluaran</p>
                  </div>
                  <button onClick={() => setShowTxModal(true)} className="bg-[#87A922] hover:bg-[#6b8719] text-white font-bold px-5 py-3 rounded-xl transition-all shadow-md hover:shadow-lg flex items-center gap-2 w-full md:w-auto justify-center">
                    <i className="fa-solid fa-plus"></i> Catat Transaksi
                  </button>
                </div>

                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                      <tr className="bg-slate-50 text-slate-400 text-xs uppercase tracking-wider">
                        <th className="p-4 font-bold rounded-tl-3xl">Tanggal</th>
                        <th className="p-4 font-bold">Deskripsi</th>
                        <th className="p-4 font-bold">Kategori / Lokasi</th>
                        <th className="p-4 font-bold">Akun</th>
                        <th className="p-4 font-bold text-right rounded-tr-3xl">Nominal (Rp)</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 text-sm">
                      {data?.transactions?.map((tx, idx) => (
                        <tr key={idx} className="hover:bg-slate-50 transition-colors">
                          <td className="p-4 text-slate-500 font-medium whitespace-nowrap">{tx.tanggalFormatted}</td>
                          <td className="p-4 font-bold text-slate-700">{tx.deskripsi}</td>
                          <td className="p-4">
                            <span className="inline-block bg-slate-100 text-slate-600 text-[10px] px-2 py-1 rounded-md font-bold mr-1">{tx.kategori}</span>
                            <span className="inline-block bg-[#EFFFF0] text-[#4A7B2A] text-[10px] px-2 py-1 rounded-md font-bold">{tx.greenhouse}</span>
                          </td>
                          <td className="p-4 text-slate-500 font-semibold">{tx.akun}</td>
                          <td className={`p-4 text-right font-black whitespace-nowrap ${tx.tipe === 'Income' ? 'text-green-600' : 'text-slate-700'}`}>
                            {tx.tipe === 'Income' ? '+' : '-'} {tx.jumlah?.toLocaleString('id-ID')}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* TAB: INVENTORI (Disederhanakan untuk contoh) */}
            {activeTab === 'inventory' && (
              <div className="space-y-6">
                <div>
                  <h2 className="text-2xl font-black text-slate-800">Gudang & Inventori</h2>
                  <p className="text-slate-500 text-sm font-medium">Pantau stok pupuk, benih, dan aset</p>
                </div>
                <div className="bg-white p-10 text-center rounded-3xl shadow-sm border border-slate-100">
                  <div className="w-20 h-20 bg-blue-50 text-blue-400 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                    <i className="fa-solid fa-boxes-stacked"></i>
                  </div>
                  <h3 className="font-bold text-slate-800 text-lg mb-2">Modul Inventori Terhubung</h3>
                  <p className="text-slate-500 text-sm max-w-md mx-auto">Data inventori telah terhubung ke API (lihat {data?.inventoryList?.length || 0} item). Anda dapat memperluas tampilan ini sama seperti tabel transaksi.</p>
                </div>
              </div>
            )}

            {/* TAB: PENGATURAN */}
            {activeTab === 'settings' && (
              <div className="space-y-6">
                <div>
                  <h2 className="text-2xl font-black text-slate-800">Pengaturan Sistem</h2>
                  <p className="text-slate-500 text-sm font-medium">Konfigurasi master data</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                   <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                     <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-house-chimney text-slate-400"></i> Daftar Greenhouse</h3>
                     <ul className="space-y-2">
                       {data?.ghList?.map((gh, idx) => (
                         <li key={idx} className="p-3 bg-slate-50 rounded-xl text-sm font-semibold text-slate-700 flex justify-between">
                           {gh.name} <span className="text-[10px] bg-slate-200 px-2 py-1 rounded text-slate-500">{gh.investor}</span>
                         </li>
                       ))}
                     </ul>
                   </div>
                   <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                     <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-users text-slate-400"></i> Daftar Pengguna</h3>
                     <ul className="space-y-2">
                       {data?.usersList?.map((u, idx) => (
                         <li key={idx} className="p-3 bg-slate-50 rounded-xl text-sm font-semibold text-slate-700 flex flex-col">
                           <span>{u.name} ({u.role})</span>
                           <span className="text-[10px] text-slate-400 font-normal">{u.email}</span>
                         </li>
                       ))}
                     </ul>
                   </div>
                </div>
              </div>
            )}

          </main>

          {/* MODAL TAMBAH TRANSAKSI */}
          {showTxModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
              <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                  <h3 className="text-xl font-black text-slate-800">Catat Transaksi</h3>
                  <button onClick={() => setShowTxModal(false)} className="w-8 h-8 bg-white rounded-full text-slate-400 hover:text-red-500 shadow-sm flex items-center justify-center transition-colors">
                    <i className="fa-solid fa-xmark"></i>
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto">
                  <form id="txForm" onSubmit={handleSaveTransaction} className="space-y-4">
                    
                    {/* Tipe Transaksi */}
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1 mb-1 block">Tipe Transaksi</label>
                      <div className="grid grid-cols-2 gap-2">
                        <label className="cursor-pointer">
                          <input type="radio" name="tipe" value="Income" className="peer sr-only" required />
                          <div className="p-3 text-center rounded-xl border border-slate-200 peer-checked:bg-green-50 peer-checked:border-green-500 peer-checked:text-green-600 font-bold text-sm transition-all text-slate-500">
                            Pemasukan (Income)
                          </div>
                        </label>
                        <label className="cursor-pointer">
                          <input type="radio" name="tipe" value="Expense" className="peer sr-only" />
                          <div className="p-3 text-center rounded-xl border border-slate-200 peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-600 font-bold text-sm transition-all text-slate-500">
                            Pengeluaran (Expense)
                          </div>
                        </label>
                      </div>
                    </div>

                    {/* Nominal & Tanggal */}
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Nominal (Rp)</label>
                        <input type="number" name="jumlah" required min="1" className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] font-bold text-slate-700" placeholder="500000" />
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Tanggal</label>
                        <input type="date" name="tanggal" required defaultValue={new Date().toISOString().split('T')[0]} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] font-semibold text-slate-700 text-sm" />
                      </div>
                    </div>

                    {/* Deskripsi */}
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Deskripsi / Keterangan</label>
                      <input type="text" name="deskripsi" required className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] font-semibold text-slate-700 text-sm" placeholder="Contoh: Beli Pupuk AB Mix 5L" />
                    </div>

                    {/* Kategori & Lokasi */}
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Lokasi / GH</label>
                        <select name="greenhouse" required className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] font-semibold text-slate-700 text-sm">
                          <option value="">-- Pilih GH --</option>
                          {data?.ghList?.map(g => <option key={g.id} value={g.name}>{g.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Akun Kas</label>
                        <select name="akun" required className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] font-semibold text-slate-700 text-sm">
                          {data?.accountList?.map(a => <option key={a} value={a}>{a}</option>)}
                        </select>
                      </div>
                    </div>

                    {/* Kategori (Sederhana untuk form ini) */}
                    <div>
                      <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Kategori</label>
                      <input type="text" name="kategori" required className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#87A922] font-semibold text-slate-700 text-sm" placeholder="Ketik Kategori..." list="cat-list"/>
                      <datalist id="cat-list">
                         {data?.categories?.income?.map(c => <option key={c} value={c}/>)}
                         {data?.categories?.expense?.map(c => <option key={c} value={c}/>)}
                      </datalist>
                    </div>
                    
                    {/* Input Status (Hidden Default) */}
                    <input type="hidden" name="statusPembayaran" value="Lunas" />

                  </form>
                </div>
                
                <div className="p-4 border-t border-slate-100 bg-white">
                  <button form="txForm" type="submit" disabled={isSubmitting} className="w-full bg-[#161B22] hover:bg-black text-white font-bold py-3.5 rounded-xl transition-all shadow-md flex justify-center items-center h-[52px]">
                    {isSubmitting ? <div className="loader"></div> : 'SIMPAN TRANSAKSI'}
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
  
  <script>
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.log('SW Registration Failed:', err);
        });
      });
    }
  </script>
</body>
</html>
