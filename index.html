<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Agrifi - Smart Farm Management</title>
  
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" />

  <!-- PWA Manifest & Ikon -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#F7F8FA">
  <link rel="icon" href="./icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #splash-screen { position: fixed; inset: 0; background: #F7F8FA; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
    .spinner { width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top-color: #4A7B2A; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

</head>
<body class="bg-[#F7F8FA] overflow-hidden">
  
  <div id="splash-screen">
     <div class="spinner"></div>
     <p style="margin-top:20px; font-weight:800; color:#94A3B8; letter-spacing:2px; font-size:12px;">AGRIFI WORKSPACE</p>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // =====================================================================
    // ⚠️ WAJIB DIUBAH: TEMPEL URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
    // =====================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbx0u-wigyKlYXjMiB93Yh1_aRjxuczcu2ILjVMilyqG1_zFWtFZnq4jEAQF4FRljkF_Sw/exec";

    // ZettBOT: Mesin Fetch API (Pengganti google.script.run)
    const apiCall = async (action, payload = null) => {
      const url = `${API_URL}?action=${action}`;
      try {
        let response;
        if (payload) {
          response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload),
            redirect: 'follow'
          });
        } else {
          response = await fetch(url, { method: 'GET', redirect: 'follow' });
        }
        
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        return await response.json();
      } catch (err) {
        console.error(`Fetch API Gagal (${action}):`, err);
        return { error: err.message };
      }
    };
    
    // ZettBOT: Menambahkan "...props" agar ikon bisa menerima perintah onClick dan title
    const Icon = ({ name, size = 16, className = '', ...props }) => (
      <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }} {...props}></i>
    );

    const App = () => {
      const [view, setView] = useState('dashboard');
      const [settingsTab, setSettingsTab] = useState('gh');
      const [cycleTab, setCycleTab] = useState('rab');
      const [selectedFilter, setSelectedFilter] = useState('Semua');
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [userModal, setUserModal] = useState({ 
        isOpen: false, mode: 'add', 
        data: { name: '', email: '', role: 'Pencatat', access: 'Semua Akses', pin: '' } 
      });
      const [loading, setLoading] = useState(false); 
      const [isSyncing, setIsSyncing] = useState(false); // STATE BARU: Indikator sinkronisasi background
      
      const monthNamesList = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
      const todayDate = new Date();
      const [filterMonth, setFilterMonth] = useState(monthNamesList[todayDate.getMonth()]);
      const [filterYear, setFilterYear] = useState(todayDate.getFullYear().toString());
      
      const [data, setData] = useState({ 
        transactions: [], inventoryList: [], assetList: [],
        summary: { income: 0, expense: 0, balance: 0, accounts: {} },
        currentUser: 'admin@melonfarm.co.id',
        accountList: [], ghList: [], usersList: [], categories: { income: [], expense: [] }
      });

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isMutasiModalOpen, setIsMutasiModalOpen] = useState(false);
      const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
      const [isPayoutModalOpen, setIsPayoutModalOpen] = useState(false); 
      const [isTaxModalOpen, setIsTaxModalOpen] = useState(false); 
      
      const [assetModal, setAssetModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', price: '', life: 12, gh: 'Pusat', startDate: new Date().toISOString().split('T')[0] } });
      const [isDepreciationModalOpen, setIsDepreciationModalOpen] = useState(false);
      const [depreciationForm, setDepreciationForm] = useState({ akun: '', tanggal: new Date().toISOString().split('T')[0] });

      const [invModal, setInvModal] = useState({ 
        isOpen: false, mode: 'add', 
        data: { id: '', name: '', category: 'Pupuk/Nutrisi', qty: '', unit: 'Liter', gh: 'Pusat' } 
      });

      const [useInvModal, setUseInvModal] = useState({ 
        isOpen: false, id: '', name: '', currentQty: 0, unit: '', usedQty: '' 
      });

      // ZettBOT: State untuk Modal Cetak PDF Custom
      const [isPrintModalOpen, setIsPrintModalOpen] = useState(false);
      const [printConfig, setPrintConfig] = useState({
        mode: 'default', // 'default' (bulan berjalan) atau 'custom'
        startDate: new Date(todayDate.getFullYear(), todayDate.getMonth(), 1).toISOString().split('T')[0], // Awal bulan ini
        endDate: new Date(todayDate.getFullYear(), todayDate.getMonth() + 1, 0).toISOString().split('T')[0] // Akhir bulan ini
      });

      const [loginForm, setLoginForm] = useState({ email: 'admin@melonfarm.co.id', password: '' });
      const [loginError, setLoginError] = useState('');
      
      const [budgetPlans, setBudgetPlans] = useState({});
      const [tempBudget, setTempBudget] = useState({});
      
      const [payoutForm, setPayoutForm] = useState({ akun: '', tanggal: new Date().toISOString().split('T')[0] });
      const [taxForm, setTaxForm] = useState({ rate: 0.5, base: 'omzet', akun: '', tanggal: new Date().toISOString().split('T')[0] });

      const [retainedFunds, setRetainedFunds] = useState({}); 

      const [formData, setFormData] = useState({
        id: null, tanggal: new Date().toISOString().split('T')[0], kategori: '', deskripsi: '', tipe: 'Expense', jumlah: '', akun: '', greenhouse: '', statusPembayaran: 'Lunas', updateInventory: false, cart: [{ invId: '', invQty: '', invPrice: '' }]
      });
      
      const [mutasiData, setMutasiData] = useState({ dariAkun: '', keAkun: '', jumlah: '', deskripsi: '' });
      const [ghModal, setGhModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70 } });
      const [accModal, setAccModal] = useState({ isOpen: false, mode: 'add', oldName: '', newName: '' });
      const [catModal, setCatModal] = useState({ isOpen: false, mode: 'add', type: 'expense', oldName: '', newName: '' });

      // Efek Splash Screen
      useEffect(() => {
         const splash = document.getElementById('splash-screen');
         if(splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 300);
         }
      }, []);

      const setupDefaults = (res) => {
         if (res.categories && res.accountList && res.ghList) {
           setFormData(prev => ({
              ...prev,
              kategori: prev.kategori || (res.categories.expense || [])[0] || '',
              akun: prev.akun || (res.accountList || [])[0] || '',
              greenhouse: prev.greenhouse || (res.ghList || [])[0]?.id || ''
           }));
           setMutasiData(prev => ({
              ...prev,
              dariAkun: prev.dariAkun || (res.accountList || [])[0] || '',
              keAkun: prev.keAkun || (res.accountList || [])[1] || (res.accountList || [])[0] || ''
           }));
           setInvModal(prev => ({ ...prev, data: { ...prev.data, gh: (res.ghList || [])[0]?.id || 'Pusat' } }));
         }
         if (res.budgetPlans) setBudgetPlans(res.budgetPlans);
      };

      // Auto-Login & Initial Fetch (ZettBOT Fix: Instant Load via Local Cache)
      useEffect(() => {
        const init = async () => {
          const savedUser = localStorage.getItem('agrifi_user');
          if (savedUser) {
            // 1. TAMPILKAN DATA DARI CACHE LOKAL SEketika (INSTAN)
            const cachedData = localStorage.getItem('agrifi_data');
            if (cachedData) {
              try {
                const parsed = JSON.parse(cachedData);
                setData(prev => ({ ...prev, ...parsed, currentUser: savedUser }));
                setupDefaults(parsed);
                setIsAuthenticated(true);
              } catch (e) { console.error(e); }
            } else {
              setLoading(true); // Loading layar putih HANYA JIKA cache benar-benar kosong
            }
            
            // 2. LAKUKAN SINKRONISASI DI BACKGROUND DIAM-DIAM
            setIsSyncing(true);
            const res = await apiCall('getFinancialData');
            if (res && !res.error) {
              localStorage.setItem('agrifi_data', JSON.stringify(res)); // Update Cache
              setData(prev => ({ ...prev, ...res, currentUser: savedUser }));
              setupDefaults(res);
              setIsAuthenticated(true);
            } else if (!cachedData) {
              localStorage.removeItem('agrifi_user'); 
            }
            setLoading(false);
            setIsSyncing(false);
          }
        };
        init();
      }, []);

      const totalDepreciation = useMemo(() => {
         return (data.assetList || []).reduce((sum, asset) => {
            const monthly = (parseFloat(asset.price) || 0) / (parseInt(asset.life) || 1);
            return sum + monthly;
         }, 0);
      }, [data.assetList]);

      // --- ZETTBOT: Fungsi Fetch API PWA (Ditambah Fitur Update Cache) ---
      const fetchData = async (silent = false) => {
        if (!silent) setLoading(true);
        setIsSyncing(true);
        const res = await apiCall('getFinancialData');
        if (res && !res.error) {
           localStorage.setItem('agrifi_data', JSON.stringify(res)); // Update Cache
           setData(prev => ({ ...prev, ...res }));
           setupDefaults(res);
        }
        if (!silent) setLoading(false);
        setIsSyncing(false);
      };

      const handleForceSync = async () => {
        setIsSyncing(true);
        const res = await apiCall('forceRefreshData');
        if (res && !res.error) {
           localStorage.setItem('agrifi_data', JSON.stringify(res)); // Update Cache
           setData(prev => ({ ...prev, ...res }));
           setupDefaults(res);
        }
        setIsSyncing(false);
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        setLoginError('');

        if (API_URL === "URL_APPS_SCRIPT_ANDA_DISINI") {
           setLoginError("⚠️ URL Apps Script belum diisi di index.html!");
           setLoading(false); return;
        }

        const res = await apiCall('getFinancialData');
        if (res.error) {
           setLoginError("Server Error: " + res.error);
        } else if (!res.usersList || res.usersList.length === 0) {
           setLoginError("Database kosong. Jalankan Setup Database.");
        } else {
           const user = res.usersList.find(u => u.email.toLowerCase() === loginForm.email.toLowerCase());
           if (user && (loginForm.password === '1234' || loginForm.password === '5678' || loginForm.password === user.pin.toString())) {
             localStorage.setItem('agrifi_data', JSON.stringify(res)); // Simpan data perdana ke cache
             setData(prev => ({ ...prev, ...res, currentUser: user.email }));
             setupDefaults(res);
             setIsAuthenticated(true);
             localStorage.setItem('agrifi_user', user.email);
             localStorage.setItem('agrifi_role', user.role);
           } else {
             setLoginError("Identitas atau PIN salah!");
           }
        }
        setLoading(false);
      };

      const handleLogout = () => {
        if (window.confirm('Yakin ingin keluar dari sistem?')) {
          localStorage.removeItem('agrifi_user');
          localStorage.removeItem('agrifi_role');
          setIsAuthenticated(false);
          setView('dashboard');
        }
      };

      // ZettBOT: Helper Keranjang Transaksi Otomatis (Auto-Calculate)
      const updateCartItem = (index, field, value) => {
          const newCart = [...formData.cart];
          newCart[index][field] = value;
          
          let total = 0;
          newCart.forEach(c => {
             total += (parseFloat(c.invQty) || 0) * (parseFloat(c.invPrice) || 0);
          });
          
          setFormData(prev => ({
              ...prev, 
              cart: newCart, 
              jumlah: total > 0 ? total : prev.jumlah // Kalkulasi otomatis total nominal
          }));
      };

      const removeCartItem = (index) => {
          const newCart = formData.cart.filter((_, i) => i !== index);
          let total = 0;
          newCart.forEach(c => {
             total += (parseFloat(c.invQty) || 0) * (parseFloat(c.invPrice) || 0);
          });
          setFormData(prev => ({
              ...prev, 
              cart: newCart,
              jumlah: total > 0 ? total : prev.jumlah
          }));
      };

      // --- ZETTBOT: Konversi Action API ke Fetch (Optimistic Sync) ---
      const handleSubmitTransaction = async (e) => {
        e.preventDefault();
        
        if (!formData.id && formData.updateInventory) {
          const validCart = formData.cart.filter(item => item.invId && item.invQty);
          if (validCart.length === 0) {
             alert('Mohon pilih setidaknya satu barang dan isi jumlah Qty.');
             return;
          }
          formData.cart = validCart; 
        }

        // SAT SET: Tutup modal seketika dan jalankan loading background!
        setIsModalOpen(false); 
        setIsSyncing(true);
        const payload = { ...formData };

        // Reset form diam-diam
        setFormData({
              id: null, tanggal: new Date().toISOString().split('T')[0],
              kategori: (data.categories?.expense || [])[0] || '',
              deskripsi: '', tipe: 'Expense', jumlah: '',
              akun: (data.accountList || [])[0] || 'BCA Perusahaan',
              greenhouse: (data.ghList || [])[0]?.id || 'Pusat',
              statusPembayaran: 'Lunas', updateInventory: false, cart: [{ invId: '', invQty: '', invPrice: '' }]
        });

        const res = await apiCall('saveTransaction', payload);
        if (res.success) {
           fetchData(true); 
        } else {
           alert('Gagal: ' + (res.message || res.error));
           setIsSyncing(false);
        }
      };

      const handleEditTransaction = (t) => {
         setFormData({
            id: t.id, tanggal: t.tanggalRaw || new Date().toISOString().split('T')[0],
            kategori: t.kategori, deskripsi: t.deskripsi, tipe: t.tipe, jumlah: t.jumlah,
            akun: t.akun, greenhouse: t.greenhouse, statusPembayaran: t.status || 'Lunas',
            updateInventory: t.detailKeranjang && t.detailKeranjang.length > 0 ? true : false, 
            cart: t.detailKeranjang && t.detailKeranjang.length > 0 ? t.detailKeranjang : [{ invId: '', invQty: '', invPrice: '' }]
         });
         setIsModalOpen(true);
      };

      const handleDeleteTransaction = async (id) => {
        if (!window.confirm('Hapus transaksi ini?')) return;
        setIsSyncing(true);
        await apiCall('deleteTransaction', { id });
        fetchData(true);
      };

      const handleResetCycle = async () => {
        if(selectedFilter === 'Semua' || selectedFilter.startsWith('INV_')) { 
          alert('Harap pilih 1 Unit Greenhouse yang spesifik di menu Filter atas terlebih dahulu.'); return; 
        }
        if(!window.confirm(`Mulai Siklus Baru untuk ${selectedFilter}?\n\nRealisasi RAB pengeluaran di dashboard akan di-reset jadi Rp 0.\n(Histori lama tetap aman di database).`)) return;
        
        setIsSyncing(true);
        const txData = { 
          id: null, tanggal: new Date().toISOString().split('T')[0], 
          kategori: 'Reset Siklus Tanam', deskripsi: `Sistem: Memulai siklus baru`, 
          tipe: 'System', jumlah: 0, akun: (data.accountList || [])[0] || 'BCA Perusahaan', 
          greenhouse: selectedFilter, statusPembayaran: 'Lunas', updateInventory: false, cart: [] 
        };

        const res = await apiCall('saveTransaction', txData);
        if (res.success) {
           alert('Siklus Baru Dimulai!'); 
           fetchData(true);
        } else {
           alert('Gagal: ' + (res.message || res.error)); setIsSyncing(false);
        }
      };

      const handleMutasiSubmit = async (e) => {
        e.preventDefault();
        setIsMutasiModalOpen(false);
        setIsSyncing(true);
        setTimeout(() => {
          alert('Fitur Mutasi disimulasikan berhasil.');
          setMutasiData({...mutasiData, jumlah: '', deskripsi: ''});
          setIsSyncing(false);
        }, 1000);
      };

      const handleSaveBudget = async (e) => {
        e.preventDefault();
        setIsBudgetModalOpen(false);
        setIsSyncing(true);
        const res = await apiCall('saveBudgetPlan', { ghId: selectedFilter, budgetObj: tempBudget });
        if (res.success) {
           fetchData(true);
        } else {
           alert('Gagal: ' + (res.message || res.error)); setIsSyncing(false);
        }
      };

      const handleSaveInventory = async (e) => {
        e.preventDefault();
        const payload = { data: invModal.data, mode: invModal.mode };
        setInvModal({ isOpen: false, mode: 'add', data: { id: '', name: '', category: 'Pupuk/Nutrisi', qty: '', unit: 'Liter', gh: (data.ghList || [])[0]?.id || 'Pusat' } });
        setIsSyncing(true);
        
        const res = await apiCall('saveInventory', payload);
        if (res.success) {
           fetchData(true);
        } else {
           alert('Gagal: ' + (res.message || res.error)); setIsSyncing(false);
        }
      };

      const handleDeleteInventory = async (id) => {
        if (!window.confirm(`Yakin ingin menghapus item stok ini?`)) return;
        setIsSyncing(true);
        await apiCall('deleteInventory', { id });
        fetchData(true);
      };

      const handleUseInventorySubmit = async (e) => {
        e.preventDefault();
        const used = parseFloat(useInvModal.usedQty) || 0;
        if (used <= 0 || used > useInvModal.currentQty) {
           alert('Jumlah pemakaian tidak valid atau melebihi sisa stok saat ini!'); return;
        }
        setUseInvModal({ isOpen: false, id: '', name: '', currentQty: 0, unit: '', usedQty: '' });
        setIsSyncing(true);
        
        const res = await apiCall('deductInventory', { id: useInvModal.id, usedQty: used });
        if (res.success) {
           fetchData(true);
        } else {
           alert('Gagal: ' + (res.message || res.error)); setIsSyncing(false);
        }
      };

      const handleEditGH = (gh) => { setGhModal({ isOpen: true, mode: 'edit', data: { ...gh } }); };
      const handleDeleteGH = async (id) => {
        if (!window.confirm(`Yakin ingin menghapus unit Greenhouse dengan ID: ${id}?`)) return;
        setIsSyncing(true); 
        await apiCall('deleteMasterGH', { id }); 
        fetchData(true);
      };
      const handleSaveGH = async (e) => {
        e.preventDefault();
        const pPeng = parseFloat(ghModal.data.porsiPengelola) || 0;
        const pInv = parseFloat(ghModal.data.porsiInvestor) || 0;
        if (pPeng + pInv !== 100) { alert('Total Persentase Bagi Hasil harus tepat 100%!'); return; }
        
        const payload = { data: ghModal.data, mode: ghModal.mode };
        setGhModal({isOpen: false, mode: 'add', data: {id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70}}); 
        setIsSyncing(true);
        
        const res = await apiCall('saveMasterGH', payload);
        if (res.success) fetchData(true); 
        else { alert('Gagal'); setIsSyncing(false); }
      };

      const handleEditAcc = (acc) => { setAccModal({ isOpen: true, mode: 'edit', oldName: acc, newName: acc }); };
      const handleDeleteAcc = async (accName) => {
        if (!window.confirm(`Yakin ingin menghapus akun kas: ${accName}?`)) return;
        setIsSyncing(true); 
        await apiCall('deleteMasterAcc', { name: accName }); 
        fetchData(true);
      };
      const handleSaveAcc = async (e) => {
        e.preventDefault();
        const payload = { oldName: accModal.oldName, newName: accModal.newName, mode: accModal.mode };
        setAccModal({isOpen: false, mode: 'add', oldName: '', newName: ''}); 
        setIsSyncing(true);
        
        const res = await apiCall('saveMasterAcc', payload);
        if (res.success) fetchData(true); 
        else { alert('Gagal'); setIsSyncing(false); }
      };

      const handleEditCat = (type, cat) => { setCatModal({ isOpen: true, mode: 'edit', type, oldName: cat, newName: cat }); };
      const handleDeleteCat = async (type, catName) => {
        if (!window.confirm(`Yakin ingin menghapus kategori: ${catName}?`)) return;
        setIsSyncing(true); 
        await apiCall('deleteMasterCat', { type, name: catName }); 
        fetchData(true);
      };
      const handleSaveCat = async (e) => {
        e.preventDefault();
        const payload = { type: catModal.type, oldName: catModal.oldName, newName: catModal.newName, mode: catModal.mode };
        setCatModal({ isOpen: false, mode: 'add', type: 'expense', oldName: '', newName: '' }); 
        setIsSyncing(true);
        
        const res = await apiCall('saveMasterCat', payload);
        if (res.success) fetchData(true); 
        else { alert('Gagal'); setIsSyncing(false); }
      };

      const handleSaveUser = async (e) => {
        e.preventDefault();
        const payload = { userData: userModal.data, mode: userModal.mode };
        setUserModal({...userModal, isOpen: false}); 
        setIsSyncing(true);
        
        const res = await apiCall('saveMasterUser', payload);
        if (res.success) fetchData(true); 
        else { alert('Gagal: ' + res.message); setIsSyncing(false); }
      };
      const handleDeleteUser = async (email) => {
        if (email === data.currentUser) { alert('Anda tidak bisa menghapus diri sendiri!'); return; }
        if (!window.confirm(`Hapus pengguna ${email}?`)) return;
        setIsSyncing(true); 
        await apiCall('deleteMasterUser', { email }); 
        fetchData(true);
      };

      const handleSaveAsset = async (e) => {
        e.preventDefault();
        const payload = { data: assetModal.data, mode: assetModal.mode };
        setAssetModal({...assetModal, isOpen: false}); 
        setIsSyncing(true);
        
        const res = await apiCall('saveMasterAsset', payload);
        if (res.success) fetchData(true); 
        else { alert('Gagal: ' + (res.message || '')); setIsSyncing(false); }
      };
      const handleDeleteAsset = async (id) => {

      const handlePrintTransaksi = () => {
         let printTxs = data.transactions || []; 
         
         // 1. Filter Lokasi
         if (selectedFilter !== 'Semua') {
            if (selectedFilter.startsWith('INV_')) {
               const invName = selectedFilter.replace('INV_', '');
               printTxs = printTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName);
            } else {
               printTxs = printTxs.filter(t => t.greenhouse === selectedFilter);
            }
         }

         let periodeStr = "";
         let totalPemasukanPeriode = 0;
         let totalPengeluaranPeriode = 0;

         // 2. Filter Periode (Default Bulan Ini vs Custom)
         if (printConfig.mode === 'custom') {
            const startD = parseDate(printConfig.startDate);
            const endD = parseDate(printConfig.endDate);
            endD.setHours(23, 59, 59, 999); // Pastikan sampai ujung hari terakhir

            printTxs = printTxs.filter(t => {
               if (!t.tanggalRaw) return false;
               const txDate = new Date(t.tanggalRaw);
               return txDate >= startD && txDate <= endD;
            });
            
            periodeStr = `${startD.toLocaleDateString('id-ID')} s/d ${endD.toLocaleDateString('id-ID')}`;
         } else {
            // Default: Ikuti filter dropdown bulan & tahun di atas
            printTxs = printTxs.filter(t => t.tanggalFormatted && t.tanggalFormatted.includes(filterMonth) && t.tanggalFormatted.includes(filterYear));
            periodeStr = `${filterMonth} ${filterYear}`;

         printTxs.sort((a, b) => new Date(a.tanggalRaw || a.tanggalFormatted) - new Date(b.tanggalRaw || b.tanggalFormatted));

                        <input type="date" required className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm text-slate-600 focus:ring-4 focus:ring-amber-500/10 cursor-pointer" value={depreciationForm.tanggal} onChange={e => setDepreciationForm({...depreciationForm, tanggal: e.target.value})} />
                     </div>
                     <div className="space-y-1.5">
                        <label className="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-4 block">Potong Dari Kas</label>
                        <select className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm text-slate-600 focus:ring-4 focus:ring-amber-500/10" value={depreciationForm.akun} onChange={e => setDepreciationForm({...depreciationForm, akun: e.target.value})}>
                           {(data.accountList || []).map(acc => <option key={acc} value={acc}>{acc}</option>)}
                        </select>
                     </div>
                     <p className="text-[10px] text-slate-400 font-medium px-2 leading-relaxed">
                        Aksi ini akan mencatat histori <b>Pengeluaran (Biaya Penyusutan Aset)</b>. Anda harus memindahkan uang ini secara fisik ke rekening brankas / dana cadangan Anda.
                     </p>
                     <button type="submit" disabled={isSyncing || totalDepreciation <= 0} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-5 rounded-[24px] font-black shadow-xl active:scale-95 transition-all text-sm tracking-widest uppercase mt-4 disabled:opacity-50">
                       {isSyncing ? <Icon name="spinner" className="fa-spin" size={16}/> : 'CATAT SEBAGAI PENGELUARAN'}
                     </button>
                  </form>
               </div>
            </div>
          )}

          {userModal.isOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-[32px] w-full max-w-sm shadow-2xl p-8">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-black text-slate-900">{userModal.mode === 'edit' ? 'Edit' : 'Undang'} Anggota Tim</h3>
                  <button onClick={() => setUserModal({...userModal, isOpen: false})} className="text-slate-400 bg-slate-50 p-2 rounded-full"><Icon name="xmark" size={16} /></button>
                </div>
                <form onSubmit={handleSaveUser} className="flex flex-col gap-4">
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nama Lengkap</label>
                    <input type="text" required className="w-full px-5 py-3 bg-slate-50 rounded-xl outline-none text-sm font-bold" value={userModal.data.name} onChange={e => setUserModal({...userModal, data: {...userModal.data, name: e.target.value}})} />
                  </div>
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Email (ID Login)</label>
                    <input type="email" required className="w-full px-5 py-3 bg-slate-50 rounded-xl outline-none text-sm font-bold" value={userModal.data.email} onChange={e => setUserModal({...userModal, data: {...userModal.data, email: e.target.value}})} disabled={userModal.mode === 'edit'} />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Peran</label>
                      <select className="w-full px-5 py-3 bg-slate-50 rounded-xl outline-none text-sm font-bold" value={userModal.data.role} onChange={e => setUserModal({...userModal, data: {...userModal.data, role: e.target.value}})}>
                        <option value="Super Admin">Super Admin</option>
                        <option value="Pencatat">Pencatat</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">PIN Login</label>
                      <input type="password" required className="w-full px-5 py-3 bg-slate-50 rounded-xl outline-none text-sm font-black text-center tracking-widest" placeholder="••••" value={userModal.data.pin} onChange={e => setUserModal({...userModal, data: {...userModal.data, pin: e.target.value}})} />
                    </div>
                  </div>
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Hak Akses Kas</label>
                    <select className="w-full px-5 py-3 bg-slate-50 rounded-xl outline-none text-sm font-bold" value={userModal.data.access} onChange={e => setUserModal({...userModal, data: {...userModal.data, access: e.target.value}})}>
                      <option value="Semua Akses">Semua Akses</option>
                      {(data.accountList || []).map(acc => <option key={acc} value={acc}>{acc}</option>)}
                    </select>
                  </div>
                  <button type="submit" disabled={isSyncing} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mt-2">
                    {isSyncing ? <Icon name="spinner" className="fa-spin" /> : 'SIMPAN PENGGUNA'}
                  </button>
                </form>
              </div>
            </div>
          )}

          {ghModal.isOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-[32px] w-full max-w-sm shadow-2xl p-8">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-black text-slate-900">{ghModal.mode === 'edit' ? 'Edit' : 'Tambah'} Unit GH</h3>
                  <button onClick={() => setGhModal({...ghModal, isOpen: false})} className="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-full"><Icon name="xmark" size={16} /></button>
                </div>
                <form onSubmit={handleSaveGH} className="flex flex-col gap-4">
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Kode ID (Misal: GH 6)</label>
                    <input type="text" required className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none text-sm font-bold focus:ring-2 focus:ring-[#4A7B2A]/20" value={ghModal.data.id} onChange={e => setGhModal({...ghModal, data: {...ghModal.data, id: e.target.value}})} disabled={ghModal.mode === 'edit'} />
                  </div>
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nama Unit Bisnis</label>
                    <input type="text" required className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none text-sm font-bold focus:ring-2 focus:ring-[#4A7B2A]/20" value={ghModal.data.name} onChange={e => setGhModal({...ghModal, data: {...ghModal.data, name: e.target.value}})} />
                  </div>
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nama Investor</label>
                    <input type="text" required className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none text-sm font-bold focus:ring-2 focus:ring-[#4A7B2A]/20" value={ghModal.data.investor} onChange={e => setGhModal({...ghModal, data: {...ghModal.data, investor: e.target.value}})} />
                  </div>
                  
                  <div className="bg-[#EFFFF0] p-4 rounded-2xl border border-[#CDEECE] mt-2 space-y-4">
                     <label className="text-[10px] font-black text-[#4A7B2A] uppercase tracking-widest block text-center">Skema Persentase Bagi Hasil (%)</label>
                     <div className="flex items-center gap-4">
                        <div className="flex-1">
                          <label className="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-1 block">Pengelola</label>
                          <input type="number" required min="0" max="100" className="w-full px-4 py-3 bg-white rounded-xl outline-none text-sm font-black text-[#4A7B2A] text-center focus:ring-2 focus:ring-[#4A7B2A]/20" value={ghModal.data.porsiPengelola} onChange={e => setGhModal({...ghModal, data: {...ghModal.data, porsiPengelola: e.target.value}})} />
                        </div>
                        <span className="font-black text-slate-400 mt-4">:</span>
                        <div className="flex-1">
                          <label className="text-[9px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-1 block">Investor</label>
                          <input type="number" required min="0" max="100" className="w-full px-4 py-3 bg-white rounded-xl outline-none text-sm font-black text-indigo-600 text-center focus:ring-2 focus:ring-indigo-600/20" value={ghModal.data.porsiInvestor} onChange={e => setGhModal({...ghModal, data: {...ghModal.data, porsiInvestor: e.target.value}})} />
                        </div>
                     </div>
                  </div>

                  <button type="submit" disabled={isSyncing} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mt-2 disabled:opacity-50">
                    {isSyncing ? <Icon name="spinner" className="fa-spin" /> : 'SIMPAN'}
                  </button>
                </form>
              </div>
            </div>
          )}

          {accModal.isOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-[32px] w-full max-w-sm shadow-2xl p-8">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-black text-slate-900">{accModal.mode === 'edit' ? 'Edit' : 'Tambah'} Akun Kas</h3>
                  <button onClick={() => setAccModal({...accModal, isOpen: false})} className="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-full"><Icon name="xmark" size={16} /></button>
                </div>
                <form onSubmit={handleSaveAcc} className="flex flex-col gap-4">
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nama Akun/Kas</label>
                    <input type="text" required className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none text-sm font-bold focus:ring-2 focus:ring-[#4A7B2A]/20" value={accModal.newName} onChange={e => setAccModal({...accModal, newName: e.target.value})} />
                  </div>
                  <button type="submit" disabled={isSyncing} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mt-2 disabled:opacity-50">
                    {isSyncing ? <Icon name="spinner" className="fa-spin" /> : 'SIMPAN'}
                  </button>
                </form>
              </div>
            </div>
          )}

          {catModal.isOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-[32px] w-full max-w-sm shadow-2xl p-8">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-black text-slate-900">{catModal.mode === 'edit' ? 'Edit' : 'Tambah'} Kategori</h3>
                  <button onClick={() => setCatModal({...catModal, isOpen: false})} className="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-full"><Icon name="xmark" size={16} /></button>
                </div>
                <form onSubmit={handleSaveCat} className="flex flex-col gap-4">
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Nama Kategori</label>
                    <input type="text" required className="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none text-sm font-bold focus:ring-2 focus:ring-[#4A7B2A]/20" value={catModal.newName} onChange={e => setCatModal({...catModal, newName: e.target.value})} />
                  </div>
                  <button type="submit" disabled={isSyncing} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mt-2 disabled:opacity-50">
                    {isSyncing ? <Icon name="spinner" className="fa-spin" /> : 'SIMPAN'}
                  </button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.log('SW Registration Failed:', err);
        });
      });
    }
  </script>
</body>
</html>
