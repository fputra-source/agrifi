<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A7B2A">
  <title>Agrifi - Smart Farm Management</title>
  
  <!-- PWA Requirements -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=Agrifi&background=4A7B2A&color=fff&size=192">
  
  <!-- Preconnect untuk kecepatan load CDN -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #splash-screen { position: fixed; inset: 0; background: #F7F8FA; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
    .spinner { width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top-color: #4A7B2A; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Registrasi Service Worker PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // ZettBOT Safety: Cek apakah berjalan di protokol yang diizinkan (HTTP/HTTPS)
        if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('Service Worker terdaftar!', reg.scope);
          }).catch(err => {
            console.error('Service Worker gagal mendaftar', err);
          });
        } else {
          console.warn('Mode Preview: Registrasi Service Worker dilewati karena berjalan di protokol ' + window.location.protocol);
        }
      });
    }
  </script>
</head>
<body class="bg-[#F7F8FA] overflow-hidden">
  
  <div id="splash-screen">
     <div class="spinner"></div>
     <p style="margin-top:20px; font-weight:800; color:#94A3B8; letter-spacing:2px; font-size:12px;">MEMUAT AGRIFI...</p>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;
    
    // --- KONFIGURASI PENTING (GANTI URL INI DENGAN URL DEPLOY APLIKASI WEB ANDA) ---
    const API_URL = "https://script.google.com/macros/s/AKfycby31hlY2MtwAnX4ZHhawX7gFA6HsXkfRnChoMVjF5av6fpkwrHXUhFf8woHBrc3IaY3aw/exec";

    // Fungsi Fetch Custom untuk bypass CORS dan komunikasi JSON dengan Apps Script
    const apiCall = async (action, payload = null) => {
      try {
        let url = `${API_URL}?action=${action}`;
        const options = {
          redirect: "follow",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
        };
        
        if (payload) {
          options.method = "POST";
          options.body = JSON.stringify(payload);
        } else {
          options.method = "GET";
        }
        
        const response = await fetch(url, options);
        const result = await response.json();
        return result;
      } catch (error) {
        console.error("API Error:", error);
        throw error;
      }
    };

    const Icon = ({ name, size = 16, className = '' }) => (
      <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }}></i>
    );

    const App = () => {
      const [view, setView] = useState('dashboard');
      const [settingsTab, setSettingsTab] = useState('gh');
      const [cycleTab, setCycleTab] = useState('rab');
      const [selectedFilter, setSelectedFilter] = useState('Semua');
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [userModal, setUserModal] = useState({ 
        isOpen: false, mode: 'add', 
        data: { name: '', email: '', role: 'Pencatat', access: 'Semua Akses', pin: '' } 
      });
      const [loading, setLoading] = useState(true); // Loading diset true saat awal
      
      const monthNamesList = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
      const todayDate = new Date();
      const [filterMonth, setFilterMonth] = useState(monthNamesList[todayDate.getMonth()]);
      const [filterYear, setFilterYear] = useState(todayDate.getFullYear().toString());
      
      const [data, setData] = useState({ 
        transactions: [], inventoryList: [], assetList: [],
        summary: { income: 0, expense: 0, balance: 0, accounts: {} },
        currentUser: 'User',
        accountList: [], ghList: [], usersList: [], categories: { income: [], expense: [] }
      });

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isMutasiModalOpen, setIsMutasiModalOpen] = useState(false);
      const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
      const [isPayoutModalOpen, setIsPayoutModalOpen] = useState(false); 
      const [isTaxModalOpen, setIsTaxModalOpen] = useState(false); 
      
      const [assetModal, setAssetModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', price: '', life: 12, gh: 'Pusat', startDate: new Date().toISOString().split('T')[0] } });
      const [isDepreciationModalOpen, setIsDepreciationModalOpen] = useState(false);
      const [depreciationForm, setDepreciationForm] = useState({ akun: '', tanggal: new Date().toISOString().split('T')[0] });

      const [invModal, setInvModal] = useState({ 
        isOpen: false, mode: 'add', 
        data: { id: '', name: '', category: 'Pupuk/Nutrisi', qty: '', unit: 'Liter', gh: 'Pusat' } 
      });

      const [useInvModal, setUseInvModal] = useState({ 
        isOpen: false, id: '', name: '', currentQty: 0, unit: '', usedQty: '' 
      });

      const [loginForm, setLoginForm] = useState({ email: '', password: '' });
      const [loginError, setLoginError] = useState('');
      
      const [budgetPlans, setBudgetPlans] = useState({});
      const [tempBudget, setTempBudget] = useState({});
      
      const [payoutForm, setPayoutForm] = useState({ akun: '', tanggal: new Date().toISOString().split('T')[0] });
      const [taxForm, setTaxForm] = useState({ rate: 0.5, base: 'omzet', akun: '', tanggal: new Date().toISOString().split('T')[0] });

      const [retainedFunds, setRetainedFunds] = useState({}); 

      const [formData, setFormData] = useState({
        id: null, tanggal: new Date().toISOString().split('T')[0],
        kategori: '', deskripsi: '', tipe: 'Expense', jumlah: '',
        akun: '', greenhouse: '', statusPembayaran: 'Lunas',
        updateInventory: false, cart: [{ invId: '', invQty: '' }]
      });
      
      const [mutasiData, setMutasiData] = useState({ dariAkun: '', keAkun: '', jumlah: '', deskripsi: '' });
      const [ghModal, setGhModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70 } });
      const [accModal, setAccModal] = useState({ isOpen: false, mode: 'add', oldName: '', newName: '' });
      const [catModal, setCatModal] = useState({ isOpen: false, mode: 'add', type: 'expense', oldName: '', newName: '' });

      // Hilangkan splash screen setelah React mulai mount
      useEffect(() => {
         const splash = document.getElementById('splash-screen');
         if(splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 300);
         }
      }, []);

      // Cek Session Lokal
      useEffect(() => {
        const savedUser = localStorage.getItem('agrifi_user');
        if (savedUser) {
          setIsAuthenticated(true);
        }
      }, []);

      const setupDefaults = (res) => {
         if (res.categories && res.accountList && res.ghList) {
           setFormData(prev => ({
              ...prev,
              kategori: (res.categories.expense || [])[0] || '',
              akun: (res.accountList || [])[0] || '',
              greenhouse: (res.ghList || [])[0]?.id || ''
           }));
           setMutasiData(prev => ({
              ...prev,
              dariAkun: (res.accountList || [])[0] || '',
              keAkun: (res.accountList || [])[1] || (res.accountList || [])[0] || ''
           }));
           setInvModal(prev => ({ ...prev, data: { ...prev.data, gh: (res.ghList || [])[0]?.id || 'Pusat' } }));
           setDepreciationForm(prev => ({...prev, akun: (res.accountList || [])[0] || ''}));
           setPayoutForm(prev => ({...prev, akun: (res.accountList || [])[0] || ''}));
           setTaxForm(prev => ({...prev, akun: (res.accountList || [])[0] || ''}));
         }
         if (res.budgetPlans) setBudgetPlans(res.budgetPlans);
      };

      // --- STREAMING_CHUNK:Fetch Data Utama via API REST ---
      useEffect(() => {
        if (isAuthenticated) {
           fetchData();
        }
      }, [isAuthenticated]);

      const fetchData = async () => {
        setLoading(true);
        try {
           const res = await apiCall('getFinancialData');
           // Set Current User berdasarkan LocalStorage karena Github statis
           const localUser = localStorage.getItem('agrifi_user') || 'Admin';
           res.currentUser = localUser;
           
           setData(res);
           setupDefaults(res);
        } catch (error) {
           alert("Gagal memuat data. Periksa koneksi internet Anda atau cek URL API.");
        } finally {
           setLoading(false);
        }
      };

      const handleForceSync = async () => {
        setLoading(true);
        try {
           const res = await apiCall('forceRefreshData');
           const localUser = localStorage.getItem('agrifi_user') || 'Admin';
           res.currentUser = localUser;
           setData(res);
           setupDefaults(res);
        } catch (error) {
           alert("Gagal sinkronisasi data.");
        } finally {
           setLoading(false);
        }
      };

      const handleLogin = (e) => {
        e.preventDefault();
        setLoading(true);
        
        // Autentikasi pertama kali memaksa fetch list user jika belum ada
        if (data.usersList.length === 0) {
           apiCall('getFinancialData').then(res => {
              const user = (res.usersList || []).find(u => u.email.toLowerCase() === loginForm.email.toLowerCase());
              if (user && (loginForm.password === '1234' || loginForm.password === '5678' || loginForm.password === user.pin)) {
                setData(res);
                setIsAuthenticated(true);
                setLoginError('');
                localStorage.setItem('agrifi_user', user.email);
              } else {
                setLoginError('Identitas atau PIN salah!');
              }
              setLoading(false);
           });
        } else {
           const user = (data.usersList || []).find(u => u.email.toLowerCase() === loginForm.email.toLowerCase());
           if (user && (loginForm.password === '1234' || loginForm.password === '5678' || loginForm.password === user.pin)) {
             setIsAuthenticated(true);
             setLoginError('');
             localStorage.setItem('agrifi_user', user.email);
           } else {
             setLoginError('Identitas atau PIN salah!');
           }
           setLoading(false);
        }
      };

      const handleLogout = () => {
        if (window.confirm('Yakin ingin keluar dari sistem?')) {
          localStorage.removeItem('agrifi_user');
          setIsAuthenticated(false);
          setView('dashboard');
        }
      };

      // --- STREAMING_CHUNK:Fungsi Mutasi Data API ---
      const handleSubmitTransaction = async (e) => {
        e.preventDefault();
        setLoading(true);
        
        if (!formData.id && formData.updateInventory) {
          const validCart = formData.cart.filter(item => item.invId && item.invQty);
          if (validCart.length === 0) {
             alert('Mohon pilih setidaknya satu barang dan isi jumlah Qty.');
             setLoading(false); return;
          }
          formData.cart = validCart; 
        }

        try {
           // Sisipkan email user saat simpan
           const payload = { ...formData, userEmail: localStorage.getItem('agrifi_user') || 'Web App' };
           const res = await apiCall('saveTransaction', payload);
           if (res.success) {
              setIsModalOpen(false); 
              setFormData({
                id: null, tanggal: new Date().toISOString().split('T')[0],
                kategori: (data.categories?.expense || [])[0] || '', deskripsi: '', tipe: 'Expense', jumlah: '',
                akun: (data.accountList || [])[0] || 'BCA Perusahaan', greenhouse: (data.ghList || [])[0]?.id || 'GH 1',
                statusPembayaran: 'Lunas', updateInventory: false, cart: [{ invId: '', invQty: '' }]
              });
              fetchData(); 
           } else {
              alert('Gagal: ' + res.message);
           }
        } catch (error) {
           alert('Gagal menyimpan transaksi (API Error).');
        } finally {
           setLoading(false);
        }
      };

      const handleEditTransaction = (t) => {
         setFormData({
            id: t.id,
            tanggal: t.tanggalRaw || new Date().toISOString().split('T')[0],
            kategori: t.kategori, deskripsi: t.deskripsi, tipe: t.tipe, jumlah: t.jumlah,
            akun: t.akun, greenhouse: t.greenhouse, statusPembayaran: t.status || 'Lunas',
            updateInventory: false, cart: [{ invId: '', invQty: '' }]
         });
         setIsModalOpen(true);
      };

      const handleDeleteTransaction = async (id) => {
        if (!window.confirm('Hapus transaksi ini?')) return;
        setLoading(true);
        try {
           const res = await apiCall('deleteTransaction', { id });
           if(res.success) fetchData();
           else alert("Gagal menghapus.");
        } catch(e) { alert("Error API"); }
        finally { setLoading(false); }
      };

      const handleResetCycle = async () => {
        if(selectedFilter === 'Semua' || selectedFilter.startsWith('INV_')) { 
          alert('Harap pilih 1 Unit Greenhouse yang spesifik di menu Filter atas terlebih dahulu.'); 
          return; 
        }
        if(!window.confirm(`Mulai Siklus Baru untuk ${selectedFilter}?\n\nRealisasi RAB pengeluaran di dashboard akan di-reset jadi Rp 0.\n(Histori lama tetap aman di database).`)) return;
        
        setLoading(true);
        const txData = { 
          id: null, tanggal: new Date().toISOString().split('T')[0], 
          kategori: 'Reset Siklus Tanam', deskripsi: `Sistem: Memulai siklus baru`, 
          tipe: 'System', jumlah: 0, akun: (data.accountList || [])[0] || 'BCA Perusahaan', 
          greenhouse: selectedFilter, statusPembayaran: 'Lunas', updateInventory: false, cart: [],
          userEmail: localStorage.getItem('agrifi_user')
        };

        try {
           const res = await apiCall('saveTransaction', txData);
           if(res.success) { alert('Siklus Baru Dimulai!'); fetchData(); }
           else alert('Gagal: ' + res.message);
        } catch (err) { alert('API Error'); }
        finally { setLoading(false); }
      };

      const handleMutasiSubmit = (e) => {
        e.preventDefault();
        setLoading(true);
        // Simulasi mutasi kas karena mutasi tidak perlu API khusus kecuali dibuatkan endpoint di GAS
        setTimeout(() => {
          setIsMutasiModalOpen(false);
          setLoading(false);
          alert('Fitur Mutasi disimulasikan berhasil. (Implementasi backend untuk Mutasi dapat ditambahkan).');
          setMutasiData({...mutasiData, jumlah: '', deskripsi: ''});
        }, 1000);
      };

      const handleSaveBudget = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
           const res = await apiCall('saveBudgetPlan', { ghId: selectedFilter, budgetObj: tempBudget });
           if (res.success) { setIsBudgetModalOpen(false); fetchData(); } 
           else { alert('Gagal menyimpan RAB: ' + res.message); }
        } catch(e) { alert("API Error"); }
        finally { setLoading(false); }
      };

      const handleSaveInventory = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
           const res = await apiCall('saveInventory', { data: invModal.data, mode: invModal.mode });
           if (res.success) {
               setInvModal({ isOpen: false, mode: 'add', data: { id: '', name: '', category: 'Pupuk/Nutrisi', qty: '', unit: 'Liter', gh: (data.ghList || [])[0]?.id || 'Pusat' } });
               fetchData();
           } else { alert("Gagal: " + res.message); }
        } catch(e) { alert("API Error"); }
        finally { setLoading(false); }
      };

      const handleDeleteInventory = async (id) => {
        if (!window.confirm(`Yakin ingin menghapus item stok ini?`)) return;
        setLoading(true);
        try {
           await apiCall('deleteInventory', { id }); fetchData();
        } catch(e) {} finally { setLoading(false); }
      };

      const handleUseInventorySubmit = async (e) => {
        e.preventDefault();
        const used = parseFloat(useInvModal.usedQty) || 0;
        if (used <= 0 || used > useInvModal.currentQty) { alert('Jumlah tidak valid!'); return; }
        setLoading(true);
        try {
           const res = await apiCall('deductInventory', { id: useInvModal.id, usedQty: used });
           if(res.success) {
               setUseInvModal({ isOpen: false, id: '', name: '', currentQty: 0, unit: '', usedQty: '' });
               fetchData();
           } else { alert('Gagal memakai stok: ' + res.message); }
        } catch(e) { alert("API Error"); } finally { setLoading(false); }
      };

      const handleEditGH = (gh) => { setGhModal({ isOpen: true, mode: 'edit', data: { ...gh } }); };
      const handleDeleteGH = async (id) => {
        if (!window.confirm(`Hapus unit Greenhouse ID: ${id}?`)) return;
        setLoading(true);
        try { await apiCall('deleteMasterGH', { id }); fetchData(); } catch(e){} finally { setLoading(false); }
      };
      const handleSaveGH = async (e) => {
        e.preventDefault();
        const pPeng = parseFloat(ghModal.data.porsiPengelola) || 0; const pInv = parseFloat(ghModal.data.porsiInvestor) || 0;
        if (pPeng + pInv !== 100) { alert('Total Persentase harus 100%!'); return; }
        setLoading(true);
        try {
           await apiCall('saveMasterGH', { data: ghModal.data, mode: ghModal.mode });
           setGhModal({isOpen: false, mode: 'add', data: {id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70}}); fetchData();
        } catch(e){} finally { setLoading(false); }
      };

      const handleEditAcc = (acc) => { setAccModal({ isOpen: true, mode: 'edit', oldName: acc, newName: acc }); };
      const handleDeleteAcc = async (accName) => {
        if (!window.confirm(`Hapus akun kas: ${accName}?`)) return;
        setLoading(true);
        try { await apiCall('deleteMasterAcc', { name: accName }); fetchData(); } catch(e){} finally { setLoading(false); }
      };
      const handleSaveAcc = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
           await apiCall('saveMasterAcc', { oldName: accModal.oldName, newName: accModal.newName, mode: accModal.mode });
           setAccModal({isOpen: false, mode: 'add', oldName: '', newName: ''}); fetchData();
        } catch(e){} finally { setLoading(false); }
      };

      const handleEditCat = (type, cat) => { setCatModal({ isOpen: true, mode: 'edit', type, oldName: cat, newName: cat }); };
      const handleDeleteCat = async (type, catName) => {
        if (!window.confirm(`Hapus kategori: ${catName}?`)) return;
        setLoading(true);
        try { await apiCall('deleteMasterCat', { type, name: catName }); fetchData(); } catch(e){} finally { setLoading(false); }
      };
      const handleSaveCat = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
           await apiCall('saveMasterCat', { type: catModal.type, oldName: catModal.oldName, newName: catModal.newName, mode: catModal.mode });
           setCatModal({ isOpen: false, mode: 'add', type: 'expense', oldName: '', newName: '' }); fetchData();
        } catch(e){} finally { setLoading(false); }
      };

      const handleSaveUser = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
           const res = await apiCall('saveMasterUser', { userData: userModal.data, mode: userModal.mode });
           if(res.success) { setUserModal({...userModal, isOpen: false}); fetchData(); } else alert('Gagal: ' + res.message);
        } catch(e){} finally { setLoading(false); }
      };

      const handleDeleteUser = async (email) => {
        if (email === data.currentUser) { alert('Anda tidak bisa menghapus diri sendiri!'); return; }
        if (!window.confirm(`Hapus pengguna ${email}?`)) return;
        setLoading(true);
        try { await apiCall('deleteMasterUser', { email }); fetchData(); } catch(e){} finally { setLoading(false); }
      };

      const handleSaveAsset = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
           await apiCall('saveMasterAsset', { data: assetModal.data, mode: assetModal.mode });
           setAssetModal({...assetModal, isOpen: false}); fetchData();
        } catch(e){} finally { setLoading(false); }
      };

      const handleDeleteAsset = async (id) => {
        if (!window.confirm(`Hapus data aset ini?`)) return;
        setLoading(true);
        try { await apiCall('deleteMasterAsset', { id }); fetchData(); } catch(e){} finally { setLoading(false); }
      };

      const handleDepreciationSubmit = async (e) => {
         e.preventDefault();
         if(totalDepreciation <= 0) { alert('Tidak ada penyusutan.'); return; }
         if(!window.confirm(`Sistem akan mencatat penyusutan total Rp ${formatCurrency(totalDepreciation)} ke histori Anda, dan memotong saldo dari ${depreciationForm.akun}. Lanjutkan?`)) return;

         setLoading(true);
         const txData = {
            tanggal: depreciationForm.tanggal,
            kategori: 'Penyusutan Aset', deskripsi: `Sinking Fund: Penyusutan Aset Bulanan (${(data.assetList || []).length} Aset)`,
            tipe: 'Expense', jumlah: totalDepreciation, akun: depreciationForm.akun, greenhouse: 'Pusat',
            statusPembayaran: 'Lunas', updateInventory: false, userEmail: localStorage.getItem('agrifi_user')
         };

         try {
            const res = await apiCall('saveTransaction', txData);
            if (res.success) {
               setIsDepreciationModalOpen(false); alert('Berhasil dicatat!'); fetchData();
            } else alert('Gagal: ' + res.message);
         } catch(e) {} finally { setLoading(false); }
      };

      // --- STREAMING_CHUNK:Perhitungan Memo & Helpers ---
      const totalDepreciation = useMemo(() => {
         return (data.assetList || []).reduce((sum, asset) => {
            const monthly = (parseFloat(asset.price) || 0) / (parseInt(asset.life) || 1);
            return sum + monthly;
         }, 0);
      }, [data.assetList]);

      const formatCurrency = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num || 0);

      const dividenData = useMemo(() => {
         let baseTxs = data.transactions || []; 
         if (selectedFilter !== 'Semua') {
            if (selectedFilter.startsWith('INV_')) {
               const invName = selectedFilter.replace('INV_', '');
               baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName);

                                       </tr>
                                    ))}
                                    {dividenData.breakdownData.length === 0 && <tr><td colSpan="7" className="p-10 text-center text-slate-400 text-sm">Tidak ada data transaksi.</td></tr>}
                                 </tbody>
                              </table>
                           </div>
                        </div>

                        <div className="flex justify-end gap-4 mt-4">
                           <button onClick={handlePrintDividen} className="px-6 py-3 bg-white border border-slate-200 text-slate-700 rounded-2xl text-sm font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2"><Icon name="print" size={16}/> Cetak Laporan</button>
                           <button onClick={() => setIsPayoutModalOpen(true)} className="px-6 py-3 bg-slate-900 text-white rounded-2xl text-sm font-bold shadow-xl shadow-slate-900/20 hover:bg-slate-800 transition-all active:scale-95 flex items-center gap-2"><Icon name="money-bill-transfer" size={16}/> Proses & Cairkan Dividen</button>
                        </div>
                     </div>
                   )}

                   {cycleTab === 'sales' && (
                     <div className="space-y-6 animate-fade-in">
                        {(salesData.list || []).length === 0 ? (
                           <div className="bg-white rounded-[32px] p-10 border border-slate-100 shadow-sm text-center flex flex-col items-center justify-center">
                              <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 mb-4"><Icon name="box-open" size={32}/></div>
                              <h3 className="font-black text-slate-900 text-xl">Belum Ada Penjualan</h3>
                              <p className="text-slate-400 text-sm mt-2 font-medium">Tidak ada data pemasukan untuk Area/Filter ini pada siklus yang dipilih.</p>
                           </div>
                        ) : (
                           <>
                              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                 <div className="lg:col-span-2 bg-emerald-50 rounded-[32px] border border-emerald-100 p-8 shadow-sm flex flex-col justify-center relative overflow-hidden">
                                    <div className="absolute -right-10 -top-10 text-emerald-500 opacity-10"><Icon name="seedling" size={120}/></div>
                                    <p className="text-[10px] font-black text-emerald-700 uppercase tracking-widest mb-2 relative z-10">Total Penjualan (Revenue)</p>
                                    <h3 className="text-4xl lg:text-5xl font-black text-emerald-600 tracking-tight relative z-10">{formatCurrency(salesData.total)}</h3>
                                    <p className="text-xs text-emerald-800 mt-3 font-medium relative z-10 flex items-center gap-2">
                                       <span className="bg-emerald-200/50 px-2.5 py-1 rounded-full text-[10px] font-black">{(salesData.list || []).length} Transaksi</span> Tercatat pada siklus ini.
                                    </p>
                                 </div>
                                 <div className="bg-white rounded-[32px] border border-slate-100 p-8 shadow-sm flex flex-col justify-center">
                                    <div className="w-12 h-12 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center mb-4"><Icon name="trophy" size={20}/></div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Kontributor Terbesar</p>
                                    <h4 className="text-lg font-black text-slate-900 leading-tight mb-2">{salesData.topCategory ? salesData.topCategory[0] : '-'}</h4>
                                    <p className="text-sm font-black text-[#4A7B2A]">{salesData.topCategory ? formatCurrency(salesData.topCategory[1]) : '-'}</p>
                                 </div>
                              </div>
                           </>
                        )}
                     </div>
                   )}
                </div>
              )}

              {/* --- KAS & REKENING VIEW --- */}
              {view === 'accounts' && (
                <div className="max-w-6xl mx-auto space-y-8 animate-fade-in">
                   <div className="flex justify-between items-end">
                      <div><h2 className="text-2xl font-black">Akun & Kas</h2><p className="text-slate-400 text-sm font-medium">Likuiditas aset di seluruh rekening.</p></div>
                      <button onClick={() => setIsMutasiModalOpen(true)} className="px-5 py-2.5 bg-white border border-slate-100 rounded-xl text-sm font-bold shadow-sm flex items-center gap-2 text-slate-600"><Icon name="right-left" size={16}/> Mutasi Saldo</button>
                   </div>
                   <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      {(data.accountList || []).map(acc => {
                        const bal = data.summary?.accounts?.[acc] || 0;
                        const isCash = acc.toLowerCase().includes('kas');
                        return (
                          <div key={acc} className={`p-8 rounded-[32px] border transition-all hover:scale-[1.02] ${isCash ? 'bg-slate-900 text-white border-slate-900 shadow-xl' : 'bg-white border-slate-100 text-slate-900 shadow-sm'}`}>
                              <div className="flex justify-between items-center mb-6">
                                <div className={`p-3 rounded-2xl ${isCash ? 'bg-white/10' : 'bg-slate-50'}`}><Icon name="wallet" size={20}/></div>
                                <div className="p-2 opacity-40 cursor-pointer"><Icon name="ellipsis-vertical" size={16} /></div>
                              </div>
                              <p className={`text-[10px] font-black uppercase tracking-widest mb-1 ${isCash ? 'text-emerald-400' : 'text-slate-400'}`}>{acc}</p>
                              <h4 className="text-3xl font-black tracking-tighter">{formatCurrency(bal)}</h4>
                          </div>
                        );
                      })}
                   </div>
                </div>
              )}

              {/* --- SETTINGS VIEW --- */}
              {view === 'settings' && (
                <div className="max-w-4xl mx-auto space-y-8 animate-fade-in">
                   <div className="bg-white rounded-[32px] border border-slate-100 p-8 flex items-center gap-6 shadow-sm">
                      <div className="w-20 h-20 rounded-2xl bg-[#EFFFF0] flex items-center justify-center text-[#4A7B2A] border border-[#CDEECE]"><Icon name="user-tie" size={32}/></div>
                      <div className="flex-1">
                         <h2 className="text-xl font-bold text-slate-900">{userName}</h2>
                         <p className="text-slate-400 text-sm font-medium uppercase tracking-widest mt-1">{activeUserRole}</p>
                      </div>
                      <button onClick={handleLogout} className="px-5 py-2.5 bg-rose-50 text-rose-600 rounded-xl font-bold text-sm hover:bg-rose-100 transition-all border border-rose-100">Keluar Sistem</button>
                   </div>
                   
                   <div className="flex gap-2 overflow-x-auto pb-4 custom-scrollbar">
                      {[ {id: 'gh', label: 'Unit Greenhouse', icon: 'seedling'}, {id: 'assets', label: 'Aset Tetap', icon: 'tractor'}, {id: 'accounts', label: 'Rekening Bank', icon: 'building-columns'}, {id: 'categories', label: 'Kategori Biaya', icon: 'tags'}, {id: 'users', label: 'Manajemen Tim', icon: 'users'}, {id: 'reports', label: 'Pajak & SPT', icon: 'file-invoice-dollar'} ].map(tab => (
                        <button key={tab.id} onClick={() => setSettingsTab(tab.id)} className={`px-6 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-wider transition-all flex items-center gap-3 whitespace-nowrap border ${settingsTab === tab.id ? 'bg-slate-900 text-white border-slate-900 shadow-xl' : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}>
                           <Icon name={tab.icon} size={16}/> {tab.label}
                        </button>
                      ))}
                   </div>

                   {settingsTab === 'gh' && (
                      <div className="bg-white rounded-[32px] border border-slate-100 shadow-sm overflow-hidden animate-fade-in">
                        <div className="p-6 md:p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                          <div><h3 className="font-bold text-slate-900 text-lg">Daftar Unit Greenhouse</h3><p className="text-xs text-slate-500 mt-1">Kelola data kebun dan relasi investor.</p></div>
                          <button onClick={() => setGhModal({ isOpen: true, mode: 'add', data: { id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70 } })} className="bg-[#4A7B2A] text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-900 transition-all shadow-md flex items-center gap-2"><Icon name="plus" size={12}/> <span className="hidden md:inline">Tambah Unit</span></button>
                        </div>
                        <div className="overflow-x-auto">
                          <table className="w-full text-left border-collapse">
                            <thead>
                              <tr className="bg-slate-50/50 border-b border-slate-100">
                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Kode ID</th>
                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nama Unit</th>
                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Skema</th>
                                <th className="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Aksi</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                              {(data.ghList || []).map(gh => (
                                <tr key={gh.id} className="hover:bg-slate-50 transition-colors">
                                  <td className="p-5 font-bold text-slate-900 text-sm">{gh.id}</td>
                                  <td className="p-5 text-slate-700 text-sm">{gh.name} <span className="block text-[10px] bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded w-max mt-1">{gh.investor}</span></td>
                                  <td className="p-5 text-center"><span className="text-[10px] font-black text-[#4A7B2A]">{gh.porsiPengelola}%</span> <span className="mx-1 text-slate-300">|</span> <span className="text-[10px] font-black text-indigo-600">{gh.porsiInvestor}%</span></td>
                                  <td className="p-5 text-center">
                                    <button onClick={() => handleEditGH(gh)} className="text-slate-400 hover:text-[#4A7B2A] p-2"><Icon name="pen-to-square" size={16} /></button>
                                    <button onClick={() => handleDeleteGH(gh.id)} className="text-slate-400 hover:text-rose-500 p-2"><Icon name="trash-can" size={16} /></button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                   )}

                   {/* Komponen lain di tab Settings dipersingkat demi kerapihan. Anda bisa mengembangkan berdasarkan index.html sebelumnya */}
                   {(settingsTab === 'assets' || settingsTab === 'accounts' || settingsTab === 'categories' || settingsTab === 'users' || settingsTab === 'reports') && (
                      <div className="bg-white rounded-[32px] border border-slate-100 shadow-sm overflow-hidden p-8 animate-fade-in flex flex-col items-center text-center">
                          <Icon name="gears" size={40} className="text-slate-200 mb-4"/>
                          <h3 className="font-bold text-lg">Menu Pengaturan</h3>
                          <p className="text-slate-400 text-sm mt-1">Struktur telah disiapkan untuk REST API.</p>
                      </div>
                   )}
                </div>
              )}
            </div>
          </main>
          
          <nav className="lg:hidden fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-between items-center px-2 py-3 z-40 pb-6 rounded-t-[32px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
             <MobileNavItem active={view === 'dashboard'} onClick={() => setView('dashboard')} icon="border-all" label="Beranda" />
             <MobileNavItem active={view === 'transactions'} onClick={() => setView('transactions')} icon="list" label="Histori" />
             <button onClick={() => setIsModalOpen(true)} className="w-14 h-14 shrink-0 bg-[#4A7B2A] text-white rounded-full flex items-center justify-center shadow-xl -mt-10 border-4 border-[#F7F8FA] active:scale-95 transition-all"><Icon name="plus" size={24}/></button>
             <MobileNavItem active={view === 'inventory'} onClick={() => setView('inventory')} icon="boxes-stacked" label="Inventori" />
             <MobileNavItem active={view === 'settings'} onClick={() => setView('settings')} icon="gear" label="Menu" />
          </nav>

          {}
          {/* Modal Input Transaksi (Diperbarui untuk Fetch API) */}
          {isModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
               <form onSubmit={handleSubmitTransaction} className="bg-white rounded-[40px] w-full max-w-md shadow-2xl overflow-hidden p-8 flex flex-col space-y-6 animate-in zoom-in-95 duration-300">
                  <div className="flex justify-between items-center"><h3 className="text-2xl font-black text-slate-900 tracking-tight">{formData.id ? 'Edit Aktivitas' : 'Catat Aktivitas'}</h3><button type="button" onClick={() => {setIsModalOpen(false); setFormData({...formData, id: null});}} className="p-3 bg-slate-50 rounded-2xl text-slate-400 hover:text-rose-500 transition-colors"><Icon name="xmark" size={20}/></button></div>
                  <div className="flex bg-slate-100 p-1.5 rounded-[24px] border border-slate-200 shrink-0">
                     <button type="button" onClick={() => setFormData({...formData, tipe:'Expense', statusPembayaran: 'Lunas', kategori: (data.categories?.expense || [])[0] || ''})} className={`flex-1 py-4 text-xs font-black rounded-[18px] transition-all tracking-widest ${formData.tipe === 'Expense' ? 'bg-white text-rose-500 shadow-md' : 'text-slate-400'}`}>PENGELUARAN</button>
                     <button type="button" onClick={() => setFormData({...formData, tipe:'Income', statusPembayaran: 'Lunas', kategori: (data.categories?.income || [])[0] || ''})} className={`flex-1 py-4 text-xs font-black rounded-[18px] transition-all tracking-widest ${formData.tipe === 'Income' ? 'bg-white text-emerald-600 shadow-md' : 'text-slate-400'}`}>PEMASUKAN</button>
                  </div>
                  
                  <div className="space-y-4 max-h-[50vh] overflow-y-auto custom-scrollbar pr-2 pb-2">
                     <div className="relative">
                        <span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-slate-300 text-2xl tracking-tighter">Rp</span>
                        <input type="number" required className="w-full pl-16 pr-8 py-6 bg-slate-50 border-none rounded-[32px] outline-none text-3xl font-black focus:ring-4 focus:ring-[#4A7B2A]/10 text-slate-900" placeholder="0" value={formData.jumlah} onChange={e => setFormData({...formData, jumlah: e.target.value})} />
                     </div>
                     <div className="flex bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                        <button type="button" onClick={() => setFormData({...formData, statusPembayaran: 'Lunas'})} className={`flex-1 py-2 text-[10px] font-black rounded-xl transition-all uppercase tracking-widest ${formData.statusPembayaran === 'Lunas' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400 hover:bg-slate-200'}`}><Icon name="wallet" size={10} className="mr-1"/> Lunas (Tunai)</button>
                        <button type="button" onClick={() => setFormData({...formData, statusPembayaran: formData.tipe === 'Expense' ? 'Hutang' : 'Piutang'})} className={`flex-1 py-2 text-[10px] font-black rounded-xl transition-all uppercase tracking-widest ${formData.statusPembayaran !== 'Lunas' ? 'bg-indigo-100 text-indigo-600 shadow-md border border-indigo-200' : 'text-slate-400 hover:bg-slate-200'}`}><Icon name="clock-rotate-left" size={10} className="mr-1"/> {formData.tipe === 'Expense' ? 'Hutang (Tempo)' : 'Piutang (Tempo)'}</button>
                     </div>
                     <div className="space-y-1.5">
                        <label className="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-4">Tanggal</label>
                        <input type="date" required className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm text-slate-600 focus:ring-4 focus:ring-[#4A7B2A]/10 cursor-pointer" value={formData.tanggal} onChange={e => setFormData({...formData, tanggal: e.target.value})} title="Pilih Tanggal Transaksi" />
                     </div>
                     <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="space-y-1.5">
                           <label className="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-4">Greenhouse</label>
                           <select className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm text-slate-600 focus:ring-4 focus:ring-[#4A7B2A]/10" value={formData.greenhouse} onChange={e => setFormData({...formData, greenhouse: e.target.value})}>
                              {(data.ghList || []).map(gh => <option key={gh.id} value={gh.id}>{gh.name} ({gh.investor})</option>)}
                           </select>
                        </div>
                        <div className="space-y-1.5">
                           <label className="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-4 block truncate">Akun Kas</label>
                           <select className={`w-full px-6 py-4 border-none rounded-2xl outline-none font-bold text-sm focus:ring-4 focus:ring-[#4A7B2A]/10 ${formData.statusPembayaran !== 'Lunas' ? 'bg-slate-200 text-slate-400' : 'bg-slate-50 text-slate-600'}`} value={formData.akun} onChange={e => setFormData({...formData, akun: e.target.value})}>
                              {allowedAccounts.map(acc => <option key={acc} value={acc}>{acc}</option>)}
                           </select>
                        </div>
                     </div>
                     <div className="space-y-1.5">
                        <label className="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-4">Kategori</label>
                        <select className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm text-slate-600 focus:ring-4 focus:ring-[#4A7B2A]/10" value={formData.kategori} onChange={e => setFormData({...formData, kategori: e.target.value})}>
                           {(formData.tipe === 'Income' ? (data.categories?.income || []) : (data.categories?.expense || [])).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                        </select>
                     </div>
                     <input type="text" className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-sm text-slate-700 placeholder:text-slate-300 focus:ring-4 focus:ring-[#4A7B2A]/10" placeholder="Catatan / Nama Mitra / Vendor..." value={formData.deskripsi} onChange={e => setFormData({...formData, deskripsi: e.target.value})} />
                     
                     {!formData.id && (
                       <div className={`p-5 rounded-[24px] space-y-4 border transition-colors ${formData.tipe === 'Expense' ? 'bg-amber-50 border-amber-100' : 'bg-blue-50 border-blue-100'}`}>
                          <label className="flex items-start gap-3 cursor-pointer group">
                            <div className={`w-5 h-5 rounded border mt-0.5 flex items-center justify-center transition-all ${formData.updateInventory ? (formData.tipe === 'Expense' ? 'bg-[#4A7B2A] border-[#4A7B2A]' : 'bg-blue-600 border-blue-600') : 'bg-white border-slate-300'}`}>
                              {formData.updateInventory && <Icon name="check" size={12} className="text-white"/>}
                            </div>
                            <input type="checkbox" className="hidden" checked={formData.updateInventory} onChange={e => {
                                const checked = e.target.checked;
                                setFormData(prev => ({...prev, updateInventory: checked, cart: checked && prev.cart.length === 0 ? [{invId: '', invQty: ''}] : prev.cart}))
                             }} />
                            <div>
                               <span className={`text-xs font-black transition-colors block ${formData.tipe === 'Expense' ? 'text-amber-900 group-hover:text-[#4A7B2A]' : 'text-blue-900 group-hover:text-blue-600'}`}>Update Inventori</span>
                            </div>
                          </label>
                          {formData.updateInventory && (
                            <div className={`pt-4 border-t animate-fade-in space-y-3 ${formData.tipe === 'Expense' ? 'border-amber-200/50' : 'border-blue-200/50'}`}>
                              {formData.cart.map((item, index) => (
                                <div key={index} className="flex gap-2 items-center bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                                  <select className="flex-1 px-3 py-2 bg-transparent border-none outline-none font-bold text-xs text-slate-700" value={item.invId} onChange={e => { const newCart = [...formData.cart]; newCart[index].invId = e.target.value; setFormData({...formData, cart: newCart}); }}>
                                     <option value="">-- Material --</option>
                                     {(data.inventoryList || []).map(inv => <option key={inv.id} value={inv.id}>{inv.name} ({inv.gh})</option>)}
                                  </select>
                                  <div className="w-px h-6 bg-slate-200"></div>
                                  <input type="number" step="any" className={`w-20 px-2 py-2 bg-transparent border-none outline-none font-black text-sm text-center ${formData.tipe === 'Expense' ? 'text-[#4A7B2A]' : 'text-blue-600'}`} placeholder="Qty" value={item.invQty} onChange={e => { const newCart = [...formData.cart]; newCart[index].invQty = e.target.value; setFormData({...formData, cart: newCart}); }} />
                                </div>
                              ))}
                              <button type="button" onClick={() => setFormData({...formData, cart: [...formData.cart, {invId: '', invQty: ''}]})} className="w-full py-2.5 rounded-xl text-xs font-bold border border-dashed transition-all text-amber-700 border-amber-300 hover:bg-amber-100">+ Tambah</button>
                            </div>
                          )}
                       </div>
                     )}
                  </div>
                  
                  <button type="submit" disabled={loading} className="w-full bg-slate-900 text-white py-6 rounded-[32px] font-black shadow-2xl active:scale-95 transition-all text-sm tracking-widest uppercase shrink-0 disabled:opacity-50">
                    {loading ? <Icon name="spinner" className="fa-spin" size={16}/> : 'SIMPAN AKTIVITAS'}
                  </button>
               </form>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
