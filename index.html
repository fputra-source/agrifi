<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A7B2A">
  <title>Agrifi - Smart Farm Management</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2763/2763444.png">

  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #splash-screen { position: fixed; inset: 0; background: #F7F8FA; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
    .spinner { width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top-color: #4A7B2A; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script>
    // Aktivasi PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</head>
<body class="bg-[#F7F8FA] overflow-hidden">
  <div id="splash-screen"><div class="spinner"></div><p style="margin-top:20px; font-weight:800; color:#94A3B8; letter-spacing:2px; font-size:12px;">AGRIFI WORKSPACE</p></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const Icon = ({ name, size = 16, className = '' }) => <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }}></i>;

    const App = () => {
      // ⚠️ MASUKKAN URL API (DO-POST) GAS ANDA DI BAWAH INI:
      const API_URL = "https://script.google.com/macros/s/AKfycbzXuy_Y5rqBnfJPPjpkzfOoKMF-nSmmXi1JbH6ti80iLRHYlKqswg33GS5lbsrShTlQrQ/exec";

      const [view, setView] = useState('dashboard');
      const [settingsTab, setSettingsTab] = useState('gh');
      const [cycleTab, setCycleTab] = useState('rab');
      const [selectedFilter, setSelectedFilter] = useState('Semua');
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [loading, setLoading] = useState(false); 
      
      const monthNamesList = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
      const todayDate = new Date();
      const [filterMonth, setFilterMonth] = useState(monthNamesList[todayDate.getMonth()]);
      const [filterYear, setFilterYear] = useState(todayDate.getFullYear().toString());
      
      const [data, setData] = useState({ 
        transactions: [], inventoryList: [], assetList: [],
        summary: { income: 0, expense: 0, balance: 0, accounts: {} },
        currentUser: '', accountList: [], ghList: [], usersList: [], categories: { income: [], expense: [] }
      });

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isMutasiModalOpen, setIsMutasiModalOpen] = useState(false);
      const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
      const [isPayoutModalOpen, setIsPayoutModalOpen] = useState(false); 
      const [isTaxModalOpen, setIsTaxModalOpen] = useState(false); 
      const [isDepreciationModalOpen, setIsDepreciationModalOpen] = useState(false);
      const [assetModal, setAssetModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', price: '', life: 12, gh: 'Pusat', startDate: new Date().toISOString().split('T')[0] } });
      const [depreciationForm, setDepreciationForm] = useState({ akun: '', tanggal: new Date().toISOString().split('T')[0] });
      const [invModal, setInvModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', category: 'Pupuk/Nutrisi', qty: '', unit: 'Liter', gh: 'Pusat' } });
      const [useInvModal, setUseInvModal] = useState({ isOpen: false, id: '', name: '', currentQty: 0, unit: '', usedQty: '' });
      const [loginForm, setLoginForm] = useState({ email: '', password: '' });
      const [loginError, setLoginError] = useState('');
      const [budgetPlans, setBudgetPlans] = useState({});
      const [tempBudget, setTempBudget] = useState({});
      const [payoutForm, setPayoutForm] = useState({ akun: '', tanggal: new Date().toISOString().split('T')[0] });
      const [taxForm, setTaxForm] = useState({ rate: 0.5, base: 'omzet', akun: '', tanggal: new Date().toISOString().split('T')[0] });
      const [retainedFunds, setRetainedFunds] = useState({}); 
      const [formData, setFormData] = useState({ id: null, tanggal: new Date().toISOString().split('T')[0], kategori: '', deskripsi: '', tipe: 'Expense', jumlah: '', akun: '', greenhouse: '', statusPembayaran: 'Lunas', updateInventory: false, cart: [{ invId: '', invQty: '' }] });
      const [mutasiData, setMutasiData] = useState({ dariAkun: '', keAkun: '', jumlah: '', deskripsi: '' });
      const [ghModal, setGhModal] = useState({ isOpen: false, mode: 'add', data: { id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70 } });
      const [accModal, setAccModal] = useState({ isOpen: false, mode: 'add', oldName: '', newName: '' });
      const [catModal, setCatModal] = useState({ isOpen: false, mode: 'add', type: 'expense', oldName: '', newName: '' });
      const [userModal, setUserModal] = useState({ isOpen: false, mode: 'add', data: { name: '', email: '', role: 'Pencatat', access: 'Semua Akses', pin: '' } });

      // UTILITY BIKIN FORMAT RP JADI NORMAL KEMBALI
      const formatCurrency = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num || 0);

      const apiCall = async (action, payloadData = null) => {
        try {
          const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data: payloadData }) });
          return await response.json();
        } catch (e) { return { success: false, message: e.toString() }; }
      };

      const fetchData = async () => {
        if (!API_URL.includes('script.google.com')) return;
        setLoading(true);
        try {
          const response = await fetch(API_URL);
          const res = await response.json();
          setData(prev => ({ ...prev, ...res }));
          if (res.categories && res.accountList && res.ghList) {
             setFormData(prev => ({ ...prev, kategori: (res.categories.expense || [])[0] || '', akun: (res.accountList || [])[0] || '', greenhouse: (res.ghList || [])[0]?.id || '' }));
             setMutasiData(prev => ({ ...prev, dariAkun: (res.accountList || [])[0] || '', keAkun: (res.accountList || [])[1] || (res.accountList || [])[0] || '' }));
             setInvModal(prev => ({ ...prev, data: { ...prev.data, gh: (res.ghList || [])[0]?.id || 'Pusat' } }));
          }
          if (res.budgetPlans) setBudgetPlans(res.budgetPlans);
        } catch (error) { console.error("API Error", error); }
        setLoading(false);
      };

      useEffect(() => {
         const splash = document.getElementById('splash-screen');
         if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 300); }
      }, []);

      useEffect(() => {
        const savedUser = localStorage.getItem('agrifi_user');
        if (savedUser) { 
          setData(prev => ({ ...prev, currentUser: savedUser })); 
          setIsAuthenticated(true); 
        }
        // Wajib menarik data dari Spreadsheet agar sistem tahu daftar User & PIN
        fetchData();
      }, []);

      const handleLogin = (e) => {
        e.preventDefault(); setLoading(true);
        const user = (data.usersList || []).find(u => u.email.toLowerCase() === loginForm.email.toLowerCase());
        if (user && (loginForm.password === '1234' || loginForm.password === '5678' || loginForm.password === user.pin)) {
          setData(prev => ({ ...prev, currentUser: user.email })); setIsAuthenticated(true); setLoginError(''); localStorage.setItem('agrifi_user', user.email); fetchData();
        } else { setLoginError('Email atau PIN salah!'); }
        setLoading(false);
      };
      
      const handleLogout = () => { if (window.confirm('Keluar sistem?')) { localStorage.removeItem('agrifi_user'); setIsAuthenticated(false); setView('dashboard'); } };

      const handleSubmitTransaction = async (e) => {
        e.preventDefault(); setLoading(true);
        if (!formData.id && formData.updateInventory) {
          const validCart = formData.cart.filter(item => item.invId && item.invQty);
          if (validCart.length === 0) { alert('Pilih minimal satu barang.'); setLoading(false); return; }
          formData.cart = validCart; 
        }
        await apiCall('saveTransaction', formData);
        setIsModalOpen(false); fetchData();
      };

      const handleEditTransaction = (t) => {
         if(t.tipe === 'System') { alert('Penanda siklus tidak bisa diedit.'); return; }
         setFormData({ id: t.id, tanggal: t.tanggalRaw || new Date().toISOString().split('T')[0], kategori: t.kategori, deskripsi: t.deskripsi, tipe: t.tipe, jumlah: t.jumlah, akun: t.akun, greenhouse: t.greenhouse, statusPembayaran: t.status || 'Lunas', updateInventory: false, cart: [{ invId: '', invQty: '' }] });
         setIsModalOpen(true);
      };

      const handleDeleteTransaction = async (id) => { if (!window.confirm('Hapus transaksi ini?')) return; setLoading(true); await apiCall('deleteTransaction', id); fetchData(); };

      const handleResetCycle = async () => {
        if(selectedFilter === 'Semua' || selectedFilter.startsWith('INV_')) { alert('Pilih 1 GH spesifik.'); return; }
        if(!window.confirm(`Mulai siklus baru untuk ${selectedFilter}? Realisasi RAB kembali ke Rp 0.`)) return;
        setLoading(true);
        const txData = { id: null, tanggal: new Date().toISOString().split('T')[0], kategori: 'Reset Siklus Tanam', deskripsi: `Sistem: Siklus baru`, tipe: 'System', jumlah: 0, akun: allowedAccounts[0] || 'Kas Tunai', greenhouse: selectedFilter, statusPembayaran: 'Lunas', updateInventory: false, cart: [] };
        await apiCall('saveTransaction', txData); fetchData();
      };

      const handleMutasiSubmit = async (e) => { e.preventDefault(); setLoading(true); await apiCall('forceRefreshData'); alert('Mutasi hanya simulasi'); setIsMutasiModalOpen(false); fetchData(); };
      const handleSaveBudget = async (e) => { e.preventDefault(); setLoading(true); await apiCall('saveBudgetPlan', { ghId: selectedFilter, budgetObj: tempBudget }); setIsBudgetModalOpen(false); fetchData(); };
      const handleSaveInventory = async (e) => { e.preventDefault(); setLoading(true); await apiCall('saveInventory', { data: invModal.data, mode: invModal.mode }); setInvModal({ isOpen: false, mode: 'add', data: { id: '', name: '', category: 'Pupuk', qty: '', unit: 'Liter', gh: 'Pusat' } }); fetchData(); };
      const handleDeleteInventory = async (id) => { if (!window.confirm(`Hapus item stok?`)) return; setLoading(true); await apiCall('deleteInventory', id); fetchData(); };
      const handleUseInventorySubmit = async (e) => { e.preventDefault(); const used = parseFloat(useInvModal.usedQty) || 0; if (used <= 0 || used > useInvModal.currentQty) { alert('Jumlah tidak valid!'); return; } setLoading(true); await apiCall('deductInventory', { id: useInvModal.id, usedQty: used }); setUseInvModal({ isOpen: false, id: '', name: '', currentQty: 0, unit: '', usedQty: '' }); fetchData(); };
      
      const handleSaveGH = async (e) => { e.preventDefault(); const pPeng = parseFloat(ghModal.data.porsiPengelola) || 0; const pInv = parseFloat(ghModal.data.porsiInvestor) || 0; if (pPeng + pInv !== 100) { alert('Total persentase harus 100%!'); return; } setLoading(true); await apiCall('saveMasterGH', { data: ghModal.data, mode: ghModal.mode }); setGhModal({ isOpen: false, mode: 'add', data: { id: '', name: '', investor: '', porsiPengelola: 30, porsiInvestor: 70 } }); fetchData(); };
      const handleDeleteGH = async (id) => { if (!window.confirm('Hapus GH ini?')) return; setLoading(true); await apiCall('deleteMasterGH', id); fetchData(); };
      const handleSaveAcc = async (e) => { e.preventDefault(); setLoading(true); await apiCall('saveMasterAcc', { oldName: accModal.oldName, newName: accModal.newName, mode: accModal.mode }); setAccModal({ isOpen: false, mode: 'add', oldName: '', newName: '' }); fetchData(); };
      const handleDeleteAcc = async (name) => { if (!window.confirm('Hapus rekening?')) return; setLoading(true); await apiCall('deleteMasterAcc', name); fetchData(); };
      const handleSaveCat = async (e) => { e.preventDefault(); setLoading(true); await apiCall('saveMasterCat', { type: catModal.type, oldName: catModal.oldName, newName: catModal.newName, mode: catModal.mode }); setCatModal({ isOpen: false, mode: 'add', type: 'expense', oldName: '', newName: '' }); fetchData(); };
      const handleDeleteCat = async (type, catName) => { if (!window.confirm('Hapus kategori?')) return; setLoading(true); await apiCall('deleteMasterCat', { type, catName }); fetchData(); };
      const handleSaveAsset = async (e) => { e.preventDefault(); setLoading(true); await apiCall('saveMasterAsset', { data: assetModal.data, mode: assetModal.mode }); setAssetModal({ isOpen: false, mode: 'add', data: { id: '', name: '', price: '', life: 12, gh: 'Pusat', startDate: new Date().toISOString().split('T')[0] } }); fetchData(); };
      const handleDeleteAsset = async (id) => { if (!window.confirm('Hapus aset ini?')) return; setLoading(true); await apiCall('deleteMasterAsset', id); fetchData(); };
      
      const totalDepreciation = useMemo(() => (data.assetList || []).reduce((sum, asset) => sum + ((parseFloat(asset.price) || 0) / (parseInt(asset.life) || 1)), 0), [data.assetList]);
      const handleDepreciationSubmit = async (e) => { e.preventDefault(); if(totalDepreciation <= 0) return; setLoading(true); const txData = { tanggal: depreciationForm.tanggal, kategori: 'Penyusutan Aset', deskripsi: `Sinking Fund`, tipe: 'Expense', jumlah: totalDepreciation, akun: depreciationForm.akun, greenhouse: 'Pusat', statusPembayaran: 'Lunas', updateInventory: false }; await apiCall('saveTransaction', txData); setIsDepreciationModalOpen(false); fetchData(); };
      const handlePayoutSubmit = async (e) => { e.preventDefault(); setLoading(true); await apiCall('processDividenPayout', { payouts: dividenData.breakdownData, akun: payoutForm.akun, tanggal: payoutForm.tanggal }); setIsPayoutModalOpen(false); fetchData(); };
      const handlePayTaxSubmit = async (e) => { e.preventDefault(); const taxBaseAmount = taxForm.base === 'omzet' ? currentSummary.income : Math.max(0, labaBersih); const estimatedTax = taxBaseAmount * (taxForm.rate / 100); setLoading(true); const txData = { tanggal: taxForm.tanggal, kategori: 'Operasional Lainnya', deskripsi: `Pembayaran PPh (${taxForm.rate}%)`, tipe: 'Expense', jumlah: estimatedTax, akun: taxForm.akun, greenhouse: 'Pusat', statusPembayaran: 'Lunas', updateInventory: false }; await apiCall('saveTransaction', txData); setIsTaxModalOpen(false); fetchData(); };
      
      const handleSaveUser = async (e) => { e.preventDefault(); setLoading(true); await apiCall('saveMasterUser', { userData: userModal.data, mode: userModal.mode }); setUserModal({ isOpen: false, mode: 'add', data: { name: '', email: '', role: 'Pencatat', access: 'Semua Akses', pin: '' } }); fetchData(); };
      const handleDeleteUser = async (email) => { if (email === data.currentUser) { alert('Tidak bisa hapus diri sendiri.'); return; } if (!window.confirm('Hapus pengguna?')) return; setLoading(true); await apiCall('deleteMasterUser', email); fetchData(); };

      // Kumpulan Data Kalkulasi
      const currentUserData = useMemo(() => (data.usersList || []).find(u => u.email === data.currentUser) || {}, [data.usersList, data.currentUser]);
      const activeUserRole = currentUserData.role || 'Admin';
      const activeUserAccess = currentUserData.access || 'Semua Akses';
      const allowedAccounts = useMemo(() => activeUserAccess === 'Semua Akses' ? (data.accountList || []) : (data.accountList || []).filter(acc => acc === activeUserAccess), [activeUserAccess, data.accountList]);
      const allowedBalance = useMemo(() => allowedAccounts.reduce((sum, acc) => sum + (data.summary?.accounts?.[acc] || 0), 0), [allowedAccounts, data.summary]);

      const filteredTransactions = useMemo(() => {
        let baseTxs = data.transactions || []; 
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
          else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
        }
        return baseTxs.filter(t => t.tanggalFormatted && t.tanggalFormatted.includes(filterMonth) && t.tanggalFormatted.includes(filterYear));
      }, [selectedFilter, data.transactions, filterMonth, filterYear, data.ghList]);

      const expenseTxs = useMemo(() => (filteredTransactions || []).filter(t => t.tipe === 'Expense'), [filteredTransactions]);
      const incomeTxs = useMemo(() => (filteredTransactions || []).filter(t => t.tipe === 'Income'), [filteredTransactions]);
      const currentSummary = useMemo(() => ({ income: incomeTxs.reduce((s,t) => s + (parseFloat(t.jumlah) || 0), 0), expense: expenseTxs.reduce((s,t) => s + (parseFloat(t.jumlah) || 0), 0) }), [incomeTxs, expenseTxs]);
      const labaBersih = currentSummary.income - currentSummary.expense;

      const saldoData = useMemo(() => {
        const monthIdx = monthNamesList.indexOf(filterMonth); const year = parseInt(filterYear); const filterStartDate = new Date(year, monthIdx, 1);
        let saldoAwal = 0; let baseTxs = data.transactions || [];
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
          else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
        }
        baseTxs.forEach(t => {
            if(t.status === 'Hutang' || t.status === 'Piutang' || t.tipe === 'System') return; 
            const amt = parseFloat(t.jumlah) || 0; const txDate = new Date(t.tanggalRaw || t.tanggalFormatted);
            if (txDate < filterStartDate) { if(t.tipe === 'Income') saldoAwal += amt; else if (t.tipe === 'Expense') saldoAwal -= amt; }
        });
        return { saldoAwal, saldoAkhir: saldoAwal + labaBersih };
      }, [data.transactions, filterMonth, filterYear, labaBersih, selectedFilter, data.ghList]);

      const cycleStartDate = useMemo(() => {
        let resets = (data.transactions || []).filter(t => t.kategori === 'Reset Siklus Tanam');
        if (selectedFilter !== 'Semua' && !selectedFilter.startsWith('INV_')) { resets = resets.filter(t => t.greenhouse === selectedFilter); } 
        else if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); resets = resets.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); }
        if (resets.length === 0) return null;
        resets.sort((a,b) => new Date(b.tanggalRaw) - new Date(a.tanggalRaw)); 
        return new Date(resets[0].tanggalRaw);
      }, [data.transactions, selectedFilter, data.ghList]);

      const cycleTxs = useMemo(() => {
        let baseTxs = data.transactions || [];
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
          else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
        }
        return baseTxs.filter(t => (t.tipe === 'Expense') && (!cycleStartDate || new Date(t.tanggalRaw || t.tanggalFormatted) >= cycleStartDate));
      }, [selectedFilter, data.transactions, data.ghList, cycleStartDate]);

      const budgetTrackerItems = useMemo(() => {
         const currentBudgetPlan = budgetPlans[selectedFilter] || {};
         return Object.keys(currentBudgetPlan).map(cat => {
            const plan = currentBudgetPlan[cat]; if (plan === 0) return null;
            const real = cycleTxs.filter(t => t.kategori === cat).reduce((s,t) => s + parseFloat(t.jumlah), 0);
            return { cat, plan, real, percentage: Math.min((real / plan) * 100, 100).toFixed(0), isOver: real > plan, icon: 'box' };
         }).filter(Boolean);
      }, [budgetPlans, selectedFilter, cycleTxs]);

      const yearlyCashflow = useMemo(() => {
        const monthlyData = Array.from({ length: 12 }, () => 0);
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
        let baseTxs = data.transactions || [];
        if (selectedFilter !== 'Semua') {
          if (selectedFilter.startsWith('INV_')) { const invName = selectedFilter.replace('INV_', ''); baseTxs = baseTxs.filter(t => (data.ghList || []).find(g => g.id === t.greenhouse)?.investor === invName); } 
          else { baseTxs = baseTxs.filter(t => t.greenhouse === selectedFilter); }
        }
        baseTxs.filter(t => t.tanggalFormatted && t.tanggalFormatted.includes(filterYear)).forEach(t => {
          if (t.status !== 'Hutang' && t.status !== 'Piutang' && t.tipe !== 'System') {
            const mIndex = months.findIndex(m => t.tanggalFormatted.includes(m));
            if (mIndex >= 0) { if (t.tipe === 'Income') monthlyData[mIndex] += parseFloat(t.jumlah); else monthlyData[mIndex] -= parseFloat(t.jumlah); }
          }
        });
        return monthlyData;
      }, [selectedFilter, filterYear, data.transactions, data.ghList]);
      const maxCashflowValue = Math.max(...yearlyCashflow.map(Math.abs), 1);
      const yearlyCashflowTotal = yearlyCashflow.reduce((a, b) => a + b, 0);

      const hutangPiutangSummary = useMemo(() => {
         const debts = (filteredTransactions || []).filter(t => t.tipe === 'Expense' && t.status === 'Hutang');
         const receives = (filteredTransactions || []).filter(t => t.tipe === 'Income' && t.status === 'Piutang');
         return { hutangList: debts, totalHutang: debts.reduce((s,t) => s + parseFloat(t.jumlah), 0), piutangList: receives, totalPiutang: receives.reduce((s,t) => s + parseFloat(t.jumlah), 0) };
      }, [filteredTransactions]);

      let currentPerc = 0; const legendData = []; const donutColors = ['#A3E635', '#4A7B2A', '#166534', '#86EFAC', '#D9F99D', '#F4F4F5'];
      const sortedCats = Object.entries(expenseTxs.reduce((acc, t) => { acc[t.kategori] = (acc[t.kategori] || 0) + parseFloat(t.jumlah); return acc; }, {})).sort((a,b) => b[1] - a[1]);
      const gradientStr = sortedCats.slice(0, 4).map((item, index) => {
         const perc = currentSummary.expense > 0 ? (item[1] / currentSummary.expense) * 100 : 0;
         let shortName = item[0]; if(shortName.includes("Nutrisi")) shortName = "Nutrisi"; else if(shortName.includes("Gaji")) shortName = "Gaji Pekerja"; else if(shortName.includes("Bibit")) shortName = "Bibit"; else if(shortName.includes("Listrik") || shortName.includes("Air")) shortName = "Utilitas";
         legendData.push({ name: shortName, perc: perc.toFixed(1), color: donutColors[index] }); 
         const res = `${donutColors[index]} ${currentPerc}% ${currentPerc + perc}%`; currentPerc += perc; return res;
      });

                    <div>
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Peran Sistem</label>
                      <select className="w-full px-5 py-3.5 bg-slate-50 rounded-xl outline-none text-sm font-bold focus:ring-2 focus:ring-[#4A7B2A]/20 cursor-pointer" value={userModal.data.role} onChange={e => setUserModal({...userModal, data: {...userModal.data, role: e.target.value}})}>
                        <option value="Super Admin">Super Admin</option>
                        <option value="Pencatat">Pencatat (Staf)</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">PIN Keamanan</label>
                      <input type="password" required className="w-full px-5 py-3.5 bg-slate-50 rounded-xl outline-none text-sm font-black text-center tracking-[0.3em] focus:ring-2 focus:ring-[#4A7B2A]/20" placeholder="••••" value={userModal.data.pin} onChange={e => setUserModal({...userModal, data: {...userModal.data, pin: e.target.value}})} />
                    </div>
                  </div>
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-1 block">Batas Hak Akses Rekening / Kas</label>
                    <select className="w-full px-5 py-3.5 bg-slate-50 rounded-xl outline-none text-sm font-bold focus:ring-2 focus:ring-[#4A7B2A]/20 cursor-pointer" value={userModal.data.access} onChange={e => setUserModal({...userModal, data: {...userModal.data, access: e.target.value}})}>
                      <option value="Semua Akses">-- Izinkan Semua Kas --</option>
                      {(data.accountList || []).map(acc => <option key={acc} value={acc}>Hanya {acc}</option>)}
                    </select>
                  </div>
                  <button type="submit" disabled={loading} className="w-full bg-[#4A7B2A] text-white py-4 rounded-2xl font-black mt-2 disabled:opacity-50 flex items-center justify-center gap-2 shadow-md">
                    {loading ? <Icon name="spinner" className="fa-spin" /> : <><Icon name="user-check"/> SIMPAN PENGGUNA</>}
                  </button>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
